<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistem Inventori APJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%);
    }
    
    /* Animasi ISO-Style Entry */
    .animate-fade-in-up {
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Custom Popup Toast Styles */
    .toast {
      position: fixed;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 9999;
    }
    .toast.show {
      top: 24px;
    }
    
    /* Efek Loading Spinner */
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid #ffffff;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  

    /* ================= APJ INVENTORI v15 UI PRO ================= */
    :root {
      --apj-blue: #3b82f6;
      --apj-sky: #38bdf8;
      --apj-emerald: #34d399;
      --apj-amber: #f59e0b;
      --apj-rose: #fb7185;
      --apj-violet: #a78bfa;
      --apj-bg: #0f172a;
      --apj-card: rgba(15, 23, 42, .86);
    }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 0% 0%, rgba(59,130,246,.18), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(167,139,250,.14), transparent 24%),
        radial-gradient(circle at 80% 100%, rgba(52,211,153,.10), transparent 30%),
        #0f172a !important;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.72), transparent 72%);
    }
    aside, main, #customToast, .apj-help-fab, .apj-mobile-menu, .apj-sidebar-backdrop, .apj-guide-modal { position: relative; z-index: 1; }
    aside {
      background: linear-gradient(180deg, rgba(2,6,23,.98), rgba(15,23,42,.96)) !important;
      border-right-color: rgba(51,65,85,.85) !important;
      box-shadow: 18px 0 50px rgba(0,0,0,.18);
    }
    aside nav a {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
    }
    aside nav a::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,.08), transparent 45%);
      opacity: 0;
      transform: translateX(-30%);
      transition: opacity .25s ease, transform .25s ease;
    }
    aside nav a:hover::after { opacity: 1; transform: translateX(0); }
    .apj-nav-ico {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 10px;
      background: rgba(15,23,42,.85);
      border: 1px solid rgba(148,163,184,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .apj-active-link {
      background: linear-gradient(135deg, rgba(59,130,246,.18), rgba(14,165,233,.08)) !important;
      border-color: rgba(59,130,246,.35) !important;
      color: #fff !important;
      box-shadow: 0 14px 35px rgba(37,99,235,.12);
    }
    .apj-card-glow, .bg-slate-950, .bg-slate-900\/80 {
      box-shadow: 0 22px 70px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .apj-lift, .bg-slate-950.border, .bg-slate-900.border {
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .apj-lift:hover, .bg-slate-950.border:hover {
      transform: translateY(-2px);
      border-color: rgba(96,165,250,.35) !important;
      box-shadow: 0 24px 70px rgba(15,23,42,.38), 0 0 0 1px rgba(96,165,250,.06) inset;
    }
    .apj-soft-animate { animation: apjSoftEnter .45s ease-out both; }
    @keyframes apjSoftEnter { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes apjPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.35); } 50% { box-shadow: 0 0 0 10px rgba(59,130,246,0); } }
    .apj-help-fab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 60;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(96,165,250,.35);
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(14,165,233,.9));
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 22px 60px rgba(37,99,235,.32);
      transition: transform .2s ease, filter .2s ease;
      animation: apjPulse 2.2s ease-in-out infinite;
    }
    .apj-help-fab:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.08); }
    .apj-guide-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .apj-guide-modal.show { display: flex; }
    .apj-guide-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(2,6,23,.82);
      backdrop-filter: blur(10px);
    }
    .apj-guide-card {
      position: relative;
      width: min(760px, 100%);
      max-height: 90dvh;
      overflow: auto;
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,.22);
      background: linear-gradient(180deg, rgba(15,23,42,.98), rgba(2,6,23,.98));
      box-shadow: 0 30px 120px rgba(0,0,0,.55);
      padding: 22px;
      transform: translateY(10px) scale(.98);
      opacity: 0;
      transition: transform .24s ease, opacity .24s ease;
    }
    .apj-guide-modal.show .apj-guide-card { transform: translateY(0) scale(1); opacity: 1; }
    .apj-guide-title {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }
    .apj-guide-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(14,165,233,.10));
      border: 1px solid rgba(96,165,250,.28);
    }
    .apj-guide-steps { display: grid; gap: 10px; margin: 16px 0; }
    .apj-guide-step {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(71,85,105,.55);
    }
    .apj-step-no {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }
    .apj-guide-note {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(245,158,11,.28);
      background: rgba(120,53,15,.20);
      color: #fde68a;
      font-size: 13px;
      line-height: 1.6;
    }
    .apj-guide-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }
    .apj-btn-soft {
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.25);
      background: rgba(15,23,42,.9);
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
    }
    .apj-btn-primary {
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 14px 40px rgba(37,99,235,.22);
    }
    .apj-mobile-menu {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 70;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(2,6,23,.88);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .apj-sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 65;
      display: none;
      background: rgba(2,6,23,.68);
      backdrop-filter: blur(7px);
    }
    .apj-sidebar-backdrop.show { display: block; }
    @media (max-width: 1023px) {
      body { min-height: 100dvh; }
      .apj-mobile-menu { display: inline-flex; }
      aside {
        position: fixed !important;
        inset: 0 auto 0 0 !important;
        width: min(290px, 86vw) !important;
        z-index: 80 !important;
        transform: translateX(-105%);
        transition: transform .28s ease !important;
      }
      aside.apj-open { transform: translateX(0) !important; }
      main header { padding-left: 68px !important; }
      input, select, textarea { font-size: 16px !important; }
      .apj-help-fab { right: 14px; bottom: 14px; padding: 11px 13px; }
      .apj-help-fab span:last-child { display: none; }
    }
    @media print {
      .apj-help-fab, .apj-guide-modal, .apj-mobile-menu, .apj-sidebar-backdrop { display: none !important; }
      body::before { display: none !important; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }
    /* ================= /APJ INVENTORI v15 UI PRO ================= */


    /* APJ Login v15 Pro polish */
    body::after {
      content: "";
      position: fixed;
      width: 460px;
      height: 460px;
      right: -140px;
      bottom: -160px;
      background: radial-gradient(circle, rgba(59,130,246,.28), transparent 64%);
      pointer-events: none;
      animation: apjFloat 8s ease-in-out infinite alternate;
    }
    @keyframes apjFloat { from { transform: translate(0, 0) scale(1); } to { transform: translate(-18px, -26px) scale(1.08); } }
    .apj-login-mark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(59,130,246,.25);
      background: rgba(37,99,235,.10);
      color: #93c5fd;
      font-size: 11px;
      font-weight: 800;
    }

  </style>
</head>
<body data-apj-page="index.html" class="min-h-screen flex items-center justify-center p-4 antialiased">

  <div id="customToast" class="toast flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md" role="alert">
    <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg" id="toastIconContainer">
      <svg id="toastIcon" class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 20 20">
        </svg>
    </div>
    <div class="ml-3 text-sm font-medium" id="toastMessage">Pesan Notifikasi</div>
  </div>

  <div class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-xl p-8 shadow-2xl backdrop-blur-md animate-fade-in-up opacity-0">
    
    <div class="text-center mb-8">
      <div class="inline-flex p-3 bg-blue-500/10 rounded-lg text-blue-500 mb-3 border border-blue-500/20">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
        </svg>
      </div>
      <h1 class="text-xl font-bold tracking-tight text-white uppercase">Sistem Inventori APJ</h1>
      <p class="text-xs text-slate-400 mt-1">Standardisasi & Manajemen Stok Terintegrasi • <span class="text-blue-400 font-semibold">v15 UI Pro</span></p>
      <div class="apj-login-mark">✨ Tampilan baru • Data lama tetap aman</div>
    </div>

    <form id="loginForm" class="space-y-5" onsubmit="handleLogin(event)">
      
      <div>
        <label for="username" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Username</label>
        <div class="relative">
          <input type="text" id="username" required autocomplete="off"
            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-200" 
            placeholder="Masukkan username Anda">
        </div>
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
        <div class="relative">
          <input type="password" id="password" required
            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all duration-200" 
            placeholder="••••••••">
        </div>
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-medium text-sm py-3 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
        <span id="btnText">Masuk ke Sistem</span>
        <span id="btnSpinner" class="spinner hidden"></span>
      </button>

    </form>

    <div class="mt-8 pt-6 border-t border-slate-800/60 text-center">
      <p class="text-[10px] text-slate-500 tracking-wider uppercase">Hak Akses Terbuka Hanya Untuk Personel Resmi APJ</p>
    </div>
  </div>

  <script>
    // URL WEB APP GOOGLE APPS SCRIPT ANDA
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";

    function showPopup(message, type = 'success') {
      const toast = document.getElementById('customToast');
      const toastMessage = document.getElementById('toastMessage');
      const iconContainer = document.getElementById('toastIconContainer');
      const icon = document.getElementById('toastIcon');

      toastMessage.innerText = message;

      if (type === 'success') {
        // Tema Sukses (Hijau Profesional)
        toast.className = "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-emerald-950/90 border-emerald-800 text-emerald-400 backdrop-blur-md";
        iconContainer.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg bg-emerald-900/50 text-emerald-400";
        icon.innerHTML = `<path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 8.207-4 4a1 1 0 0 1-1.414 0l-2-2a1 1 0 0 1 1.414-1.414L9 10.586l3.293-3.293a1 1 0 0 1 1.414 1.414Z"/>`;
      } else {
        // Tema Gagal/Error (Merah Korporat)
        toast.className = "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-rose-950/90 border-rose-800 text-rose-400 backdrop-blur-md";
        iconContainer.className = "inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-lg bg-rose-900/50 text-rose-400";
        icon.innerHTML = `<path d="M10 .5a9.5 9.5 0 1 0 9.5 9.5A9.51 9.51 0 0 0 10 .5Zm3.707 11.793a1 1 0 1 1-1.414 1.414L10 11.414l-2.293 2.293a1 1 0 0 1-1.414-1.414L8.586 10 6.293 7.707a1 1 0 0 1 1.414-1.414L10 8.586l2.293-2.293a1 1 0 0 1 1.414 1.414L11.414 10l2.293 2.293Z"/>`;
      }

      // Sembunyikan otomatis setelah 4 detik
      setTimeout(() => {
        toast.classList.remove('show');
      }, 4000);
    }

    async function handleLogin(event) {
      event.preventDefault();

      const usernameInput = document.getElementById('username').value.trim();
      const passwordInput = document.getElementById('password').value;
      
      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const btnSpinner = document.getElementById('btnSpinner');

      // PERBAIKAN 1: Pengecekan URL sudah diperbaiki agar tidak error
      if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "") {
        showPopup("Konfigurasi Error: Developer belum memasukkan URL API Apps Script.", "error");
        return;
      }

      // Mengubah State tombol ke Loading Mode (Animasi Spinner)
      submitBtn.disabled = true;
      btnText.innerText = "Memverifikasi Kredensial...";
      btnSpinner.classList.remove('hidden');

      try {
        // PERBAIKAN 2: Penambahan method headers dan redirect: 'follow'
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({
            action: 'login', // Tambahkan baris ini
            username: usernameInput,
            password: passwordInput
          })
        });

        const result = await response.json();

        if (result.success) {
          showPopup(result.message + " Selamat datang, " + result.user.nama, "success");
          
          // Menyimpan data sesi login ke LocalStorage
          localStorage.setItem('APJ_SESSION_ACTIVE', 'true');
          localStorage.setItem('APJ_USER_NAME', result.user.nama);
          localStorage.setItem('APJ_USER_LEVEL', result.user.level);
          
          // BARU: Simpan data permission sebagai string JSON
          localStorage.setItem('APJ_USER_PERMISSIONS', JSON.stringify(result.user.permissions));

          // Redirect ke Halaman Dashboard
          setTimeout(() => {
             window.location.href = "dashboard.html"; 
          }, 1500);

        } else {
          showPopup(result.message, "error");
          // Kembalikan State Tombol
          submitBtn.disabled = false;
          btnText.innerText = "Masuk ke Sistem";
          btnSpinner.classList.add('hidden');
        }

      } catch (error) {
        showPopup("Gagal terhubung ke server database. Periksa koneksi internet Anda.", "error");
        console.error(error); // Untuk membantu debugging di console browser
        // Kembalikan State Tombol
        submitBtn.disabled = false;
        btnText.innerText = "Masuk ke Sistem";
        btnSpinner.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
