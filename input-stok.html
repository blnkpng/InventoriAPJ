<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Stok | Sistem Inventori APJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; z-index: 9999; }
    .toast.show { top: 24px; }
    
    /* Menghilangkan panah atas-bawah pada input number */
    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <div id="customToast" class="toast flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md" role="alert">
    <div class="ml-3 text-sm font-medium" id="toastMessage">Pesan Notifikasi</div>
  </div>

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
      <div class="flex items-center gap-3 text-blue-500">
        <span class="text-sm font-bold tracking-wider text-white">APJ INVENTORI</span>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-blue-600/10 text-blue-500 rounded-lg font-medium text-sm transition-colors border border-blue-500/20">Input Stok</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Output Stok</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Stok Opname</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
      <h2 class="text-lg font-semibold text-white">Form Input Stok (Multi Item & Konversi)</h2>
      <div class="text-sm font-medium text-slate-400">Petugas: <span id="namaPetugas" class="text-blue-400">Memuat...</span></div>
    </header>

    <div class="p-8 max-w-[1400px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tanggal Transaksi</label>
            <input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kategori Transaksi</label>
            <select id="kategoriSelect" onchange="handleKategoriChange()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
              <option value="" disabled selected>-- Pilih Kategori --</option>
            </select>
          </div>
        </div>

        <div class="border border-slate-800 rounded-lg overflow-x-auto mb-6">
          <table class="w-full text-left border-collapse min-w-[800px]">
            <thead>
              <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
                <th class="p-4 w-4/12">Nama Barang</th>
                <th class="p-4 w-2/12 text-center">Qty Masuk (Beli)</th>
                <th class="p-4 w-1/12 text-center">Satuan</th>
                <th class="p-4 w-2/12 text-center">Qty Stok (Riil)</th>
                <th class="p-4 w-1/12 text-center">Satuan</th>
                <th class="p-4 w-2/12 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="itemTableBody">
              <tr class="border-b border-slate-800/50 bg-slate-950 item-row">
                <td class="p-3">
                  <select onchange="updateSatuan(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang" disabled>
                    <option value="">Pilih kategori terlebih dahulu...</option>
                  </select>
                </td>
                <td class="p-3">
                  <input type="number" min="0.001" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-qty-masuk text-center" placeholder="0" disabled>
                </td>
                <td class="p-3 text-center">
                  <span class="text-sm font-semibold text-slate-500 label-satuan-beli">-</span>
                </td>
                <td class="p-3">
                  <input type="number" min="0.001" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-qty-stok text-center" placeholder="0" disabled>
                </td>
                <td class="p-3 text-center">
                  <span class="text-sm font-bold text-blue-400 label-satuan-stok">-</span>
                </td>
                <td class="p-3 text-center">
                  <button type="button" class="text-slate-600 text-sm font-medium" disabled>Hapus</button>
                </td>
              </tr>
            </tbody>
          </table>
          <div class="bg-slate-900 p-3 text-center border-t border-slate-800">
            <button type="button" id="btnTambahBaris" onclick="tambahBarisBaru()" class="text-blue-500 hover:text-blue-400 text-sm font-medium flex items-center justify-center gap-2 w-full" disabled>
              + Tambah Baris Barang
            </button>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" id="btnSimpan" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg text-sm font-semibold transition-colors shadow-lg shadow-blue-600/20">
            Simpan Transaksi Input
          </button>
        </div>

      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let globalListBarang = [];

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') {
        window.location.href = 'index.html';
        return;
      }

      document.getElementById('namaPetugas').textContent = localStorage.getItem('APJ_USER_NAME');
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];

      const permissions = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kategoriSelect = document.getElementById('kategoriSelect');
      
      const kategoriMap = [
        { key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' },
        { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' },
        { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' },
        { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' },
        { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }
      ];

      kategoriMap.forEach(kat => {
        if (permissions[kat.key] === 'Y') {
          const option = document.createElement('option');
          option.value = kat.sheet;
          option.textContent = kat.label;
          kategoriSelect.appendChild(option);
        }
      });
    });

    function showToast(message, type = 'success') {
      const toast = document.getElementById('customToast');
      document.getElementById('toastMessage').textContent = message;
      toast.className = type === 'success' 
        ? "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-emerald-950/90 border-emerald-800 text-emerald-400 backdrop-blur-md"
        : "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-rose-950/90 border-rose-800 text-rose-400 backdrop-blur-md";
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    async function handleKategoriChange() {
      const selectedSheet = document.getElementById('kategoriSelect').value;
      if (!selectedSheet) return;

      const tbody = document.getElementById('itemTableBody');
      tbody.innerHTML = `
        <tr class="border-b border-slate-800/50 bg-slate-950 item-row">
          <td class="p-3">
            <select onchange="updateSatuan(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang" disabled>
              <option value="">Memuat data...</option>
            </select>
          </td>
          <td class="p-3"><input type="number" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-qty-masuk text-center" disabled></td>
          <td class="p-3 text-center"><span class="text-sm font-semibold text-slate-500 label-satuan-beli">-</span></td>
          <td class="p-3"><input type="number" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-qty-stok text-center" disabled></td>
          <td class="p-3 text-center"><span class="text-sm font-bold text-blue-400 label-satuan-stok">-</span></td>
          <td class="p-3 text-center"><button type="button" class="text-slate-600 text-sm font-medium" disabled>Hapus</button></td>
        </tr>
      `;
      document.getElementById('btnTambahBaris').disabled = true;

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({ action: 'getBarang', sheetName: selectedSheet })
        });

        const result = await response.json();

        if (result.success) {
          globalListBarang = result.data;
          
          if (globalListBarang.length === 0) {
            showToast("Tabel master kosong.", "error");
            return;
          }

          const firstSelect = tbody.querySelector('.select-barang');
          const inputs = tbody.querySelectorAll('input[type="number"]');
          populateSelectElement(firstSelect);
          
          firstSelect.disabled = false;
          inputs.forEach(input => input.disabled = false);
          document.getElementById('btnTambahBaris').disabled = false;
          showToast(`Berhasil memuat ${globalListBarang.length} barang.`, "success");
        } else {
          showToast(result.message, "error");
        }
      } catch (error) {
        showToast("Koneksi gagal.", "error");
      }
    }

    function populateSelectElement(selectElement) {
      selectElement.innerHTML = '<option value="" disabled selected>-- Pilih Barang --</option>';
      globalListBarang.forEach(barang => {
        const option = document.createElement('option');
        option.value = barang.id;
        option.textContent = `[${barang.id}] ${barang.nama}`;
        // Menyimpan DUA satuan ke dalam dataset
        option.setAttribute('data-satuan-beli', barang.satuanBeli || '-'); 
        option.setAttribute('data-satuan-stok', barang.satuanStok || '-'); 
        selectElement.appendChild(option);
      });
    }

    function tambahBarisBaru() {
      const tbody = document.getElementById('itemTableBody');
      const tr = document.createElement('tr');
      tr.className = "border-b border-slate-800/50 bg-slate-950 item-row";
      
      tr.innerHTML = `
        <td class="p-3">
          <select onchange="updateSatuan(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang">
          </select>
        </td>
        <td class="p-3">
          <input type="number" min="0.001" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-qty-masuk text-center" placeholder="0">
        </td>
        <td class="p-3 text-center">
          <span class="text-sm font-semibold text-slate-500 label-satuan-beli">-</span>
        </td>
        <td class="p-3">
          <input type="number" min="0.001" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-qty-stok text-center" placeholder="0">
        </td>
        <td class="p-3 text-center">
          <span class="text-sm font-bold text-blue-400 label-satuan-stok">-</span>
        </td>
        <td class="p-3 text-center">
          <button type="button" class="text-rose-500 hover:text-rose-400 text-sm font-medium" onclick="this.closest('tr').remove()">Hapus</button>
        </td>
      `;
      
      tbody.appendChild(tr);
      const newSelect = tr.querySelector('.select-barang');
      populateSelectElement(newSelect);
    }

    // Fungsi otomatis memperbarui DUA satuan saat dropdown dipilih
    function updateSatuan(selectElement) {
      const selectedOption = selectElement.options[selectElement.selectedIndex];
      const satuanBeli = selectedOption.getAttribute('data-satuan-beli') || '-';
      const satuanStok = selectedOption.getAttribute('data-satuan-stok') || '-';
      
      const row = selectElement.closest('tr');
      row.querySelector('.label-satuan-beli').textContent = satuanBeli;
      row.querySelector('.label-satuan-stok').textContent = satuanStok;
    }
    // FUNGSI SIMPAN DATA KE DATABASE (INPUT STOK)
    document.getElementById('btnSimpan').addEventListener('click', async () => {
      const tanggal = document.getElementById('tanggalInput').value;
      const kategoriSelect = document.getElementById('kategoriSelect');
      const kategori = kategoriSelect.options[kategoriSelect.selectedIndex].text;
      const petugas = localStorage.getItem('APJ_USER_NAME');

      if (!tanggal || !kategoriSelect.value) {
        showToast("Tanggal dan Kategori wajib diisi!", "error"); return;
      }

      const rows = document.querySelectorAll('.item-row');
      let dataToSave = [];
      let hasError = false;

      rows.forEach(row => {
        const select = row.querySelector('.select-barang');
        const qtyBeli = row.querySelector('.input-qty-masuk').value;
        const qtyStok = row.querySelector('.input-qty-stok').value;

        if (select.value && qtyBeli > 0 && qtyStok > 0) {
          const idBarang = select.value;
          const namaBarang = select.options[select.selectedIndex].text.split('] ')[1];
          const satuanBeli = row.querySelector('.label-satuan-beli').innerText;
          const satuanStok = row.querySelector('.label-satuan-stok').innerText;
          // Format urutan array: Tanggal, Petugas, Kategori, ID, Nama, Qty Beli, Sat Beli, Qty Stok, Sat Stok
          dataToSave.push([tanggal, petugas, kategori, idBarang, namaBarang, qtyBeli, satuanBeli, qtyStok, satuanStok]);
        } else if (select.value) {
          hasError = true;
        }
      });

      if (dataToSave.length === 0 || hasError) {
        showToast("Harap isi Qty Masuk & Qty Stok untuk barang yang dipilih!", "error"); return;
      }

      const btnSimpan = document.getElementById('btnSimpan');
      btnSimpan.disabled = true; btnSimpan.innerText = "Menyimpan ke Database...";

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow',
          body: JSON.stringify({ action: 'simpanTransaksi', sheetName: 'TRANSAKSI_INPUT_STOK', data: dataToSave })
        });
        const result = await response.json();
        if (result.success) {
          showToast(result.message, "success");
          setTimeout(() => location.reload(), 2000); // Otomatis refresh form setelah sukses
        } else showToast(result.message, "error");
      } catch (err) {
        showToast("Gagal terhubung ke server.", "error");
      }
      btnSimpan.disabled = false; btnSimpan.innerText = "Simpan Transaksi Input";
    });
    
  </script>
</body>
</html>
