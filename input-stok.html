<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Stok | Sistem Inventori APJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
  </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
      <div class="flex items-center gap-3 text-blue-500">
        <span class="text-sm font-bold tracking-wider text-white">APJ INVENTORI</span>
      </div>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Dashboard</a>
      
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-blue-600/10 text-blue-500 rounded-lg font-medium text-sm transition-colors border border-blue-500/20">Input Stok</a>
      
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Output Stok</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Stok Opname</a>
      <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
      <h2 class="text-lg font-semibold text-white">Form Input Stok</h2>
      <div class="text-sm font-medium text-slate-400">Petugas: <span id="namaPetugas" class="text-blue-400">Memuat...</span></div>
    </header>

    <div class="p-8 max-w-5xl mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Tanggal Masuk</label>
            <input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Kategori Barang</label>
            <select id="kategoriSelect" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-blue-500 focus:outline-none">
              <option value="" disabled selected>-- Pilih Kategori --</option>
              </select>
          </div>
        </div>

        <div class="border border-slate-800 rounded-lg overflow-hidden mb-6">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
                <th class="p-3 w-1/2">Nama Barang</th>
                <th class="p-3 w-1/4">Jumlah (Qty)</th>
                <th class="p-3 w-1/4 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="itemTableBody">
              <tr class="border-b border-slate-800/50 bg-slate-950">
                <td class="p-3">
                  <select class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm text-white select-barang disabled:opacity-50" disabled>
                    <option value="">Pilih kategori terlebih dahulu...</option>
                  </select>
                </td>
                <td class="p-3">
                  <input type="number" min="0.01" step="any" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm text-white input-qty" placeholder="0">
                </td>
                <td class="p-3 text-center">
                  <button type="button" class="text-rose-500 hover:text-rose-400 text-sm font-medium disabled:opacity-50" disabled>Hapus</button>
                </td>
              </tr>
            </tbody>
          </table>
          <div class="bg-slate-900 p-3 text-center border-t border-slate-800">
            <button type="button" id="btnTambahBaris" class="text-blue-400 hover:text-blue-300 text-sm font-medium flex items-center justify-center gap-2 w-full">
              + Tambah Baris Barang
            </button>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition-colors shadow-lg shadow-blue-600/20">
            Simpan Transaksi Input
          </button>
        </div>

      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Pengecekan Sesi Login
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') {
        window.location.href = 'index.html';
        return;
      }

      // Tampilkan Nama Petugas
      document.getElementById('namaPetugas').textContent = localStorage.getItem('APJ_USER_NAME');

      // 2. Set Tanggal Otomatis Hari Ini
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('tanggalInput').value = today;

      // 3. LOGIKA FILTER KATEGORI BERDASARKAN HAK AKSES
      const permissions = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kategoriSelect = document.getElementById('kategoriSelect');
      
      // Pemetaan kunci permission dengan nama tabel di Database
      const kategoriMap = [
        { key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' },
        { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' },
        { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' },
        { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' },
        { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }
      ];

      // Looping untuk memasukkan kategori yang berstatus 'Y' saja
      kategoriMap.forEach(kat => {
        if (permissions[kat.key] === 'Y') {
          const option = document.createElement('option');
          option.value = kat.sheet; // Value menyimpan nama sheet tujuan
          option.textContent = kat.label;
          kategoriSelect.appendChild(option);
        }
      });
    });

    // Fitur Tambah Baris (Frontend Only untuk sementara)
    document.getElementById('btnTambahBaris').addEventListener('click', () => {
      const tbody = document.getElementById('itemTableBody');
      const newRow = document.createElement('tr');
      newRow.className = "border-b border-slate-800/50 bg-slate-950";
      newRow.innerHTML = `
        <td class="p-3">
          <select class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm text-white select-barang">
            <option value="">(Data Barang Belum Ditarik)</option>
          </select>
        </td>
        <td class="p-3">
          <input type="number" min="0.01" step="any" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm text-white input-qty" placeholder="0">
        </td>
        <td class="p-3 text-center">
          <button type="button" class="text-rose-500 hover:text-rose-400 text-sm font-medium" onclick="this.closest('tr').remove()">Hapus</button>
        </td>
      `;
      tbody.appendChild(newRow);
    });
  </script>
</body>
</html>
