<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
    
    /* Layout untuk Print */
    @media print {
      body { background: white !important; color: black !important; font-family: 'Times New Roman', serif; }
      .no-print { display: none !important; }
      #printArea { display: block !important; width: 100%; margin: 0; padding: 0; }
      
      @page { size: A4 portrait; margin: 1cm; }
      
      /* Kop Surat */
      .kop-surat { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 10px; }
      
      /* Tabel */
      table { border-collapse: collapse; width: 100%; margin: 20px 0; font-size: 11pt; table-layout: fixed; }
      th { border: 1px solid black !important; padding: 8px !important; text-align: center !important; background-color: #eee !important; font-weight: bold !important; }
      td { border: 1px solid black !important; padding: 6px !important; text-align: center !important; font-weight: normal !important; }
      
      /* TTD */
      #printTTD { display: flex; justify-content: space-around; margin-top: 40px; }
      .ttd-box { text-align: center; width: 30%; }
      .nama-ttd { font-weight: bold; text-decoration: underline; }
    }
  </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <div id="modalPrint" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50 p-4 no-print">
    <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl">
      <h3 class="text-white font-bold mb-4">Data Penandatangan</h3>
      <div class="mb-4"><label class="text-xs text-slate-400">Nama Supervisor</label><input type="text" id="modalSup" class="w-full bg-slate-800 p-2 rounded text-white text-sm border border-slate-600"></div>
      <div class="mb-4"><label class="text-xs text-slate-400">Nama PIC 1</label><input type="text" id="modalPic1" class="w-full bg-slate-800 p-2 rounded text-white text-sm border border-slate-600"></div>
      <div class="mb-6"><label class="text-xs text-slate-400">Nama PIC 2</label><input type="text" id="modalPic2" class="w-full bg-slate-800 p-2 rounded text-white text-sm border border-slate-600"></div>
      <div class="flex gap-3">
        <button onclick="document.getElementById('modalPrint').classList.add('hidden')" class="flex-1 bg-slate-700 py-2 rounded text-sm text-white">Batal</button>
        <button onclick="processPrint()" class="flex-1 bg-emerald-600 py-2 rounded text-sm text-white font-bold">Sudah Sesuai</button>
      </div>
    </div>
  </div>

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0 no-print">
    <div class="h-16 flex items-center px-6 border-b border-slate-800 text-white font-bold tracking-wider">APJ INVENTORI</div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Input Stok</a>
      <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Output Stok</a>
      <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Stok Opname</a>
      <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-emerald-600/10 text-emerald-500 rounded-lg text-sm border border-emerald-500/20">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col bg-slate-900 overflow-y-auto no-print">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50">
      <h2 class="text-lg font-semibold text-emerald-400">Laporan Stok Terkini</h2>
    </header>
    <div class="p-8 max-w-[1000px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        <div class="flex flex-col md:flex-row gap-4 mb-8">
           <select id="kategoriSelect" onchange="loadStokData()" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white">
            <option value="" disabled selected>-- Pilih Kategori --</option>
           </select>
           <button onclick="document.getElementById('modalPrint').classList.remove('hidden')" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold">Simpan Sebagai PDF</button>
        </div>
        <div class="border border-slate-800 rounded-lg overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-900 text-xs text-slate-400 border-b border-slate-800 uppercase">
                    <tr><th class="p-4 text-center">ID Barang</th><th class="p-4 text-center">Nama Barang</th><th class="p-4 text-center">Qty Stok</th><th class="p-4 text-center">Satuan</th></tr>
                </thead>
                <tbody id="tbodyStok"></tbody>
            </table>
        </div>
      </div>
    </div>
  </main>

  <div id="printArea" style="display:none;">
    <div class="kop-surat">
        <img src="https://i.imgur.com/Sb5mLrt.png" style="height: 60px;">
        <div style="text-align: center;">
            <div style="font-weight: bold; font-size: 20pt;">AMPERA PAK JENGGOT</div>
            <div style="font-style: italic; font-size: 12pt;" id="printSub"></div>
        </div>
    </div>
    <hr style="border: 1px solid black; margin: 10px 0;">
    <div style="text-align: center; font-size: 10pt;" id="printDate"></div>
    
    <table id="printTable">
      <thead><tr><th>ID Barang</th><th>Nama Barang</th><th>Qty Stok</th><th>Satuan</th></tr></thead>
      <tbody id="printTbody"></tbody>
    </table>

    <div style="text-align: center; margin-top: 20px; font-size: 11pt;">Batu, <span id="printLocDate"></span></div>
    <div id="printTTD"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    
    document.addEventListener('DOMContentLoaded', () => {
      const nama = localStorage.getItem('APJ_USER_NAME') || '';
      document.getElementById('modalSup').value = nama;
      document.getElementById('modalPic1').value = nama;
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(k => { if(perms[k.key] === 'Y') document.getElementById('kategoriSelect').innerHTML += `<option value="${k.sheet}">${k.label}</option>`; });
    });

    async function loadStokData() {
      const sh = document.getElementById('kategoriSelect').value;
      const tbody = document.getElementById('tbodyStok');
      tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-500">Memuat...</td></tr>';
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
      if(res.success) {
        tbody.innerHTML = res.data.map(b => `<tr class="border-b border-slate-800 bg-slate-950">
            <td class="p-4 text-sm text-slate-400 text-center">${b.id}</td>
            <td class="p-4 text-sm text-white text-center">${b.nama}</td>
            <td class="p-4 text-center text-emerald-400 text-center">${b.stokTersedia}</td>
            <td class="p-4 text-sm text-slate-400 text-center">${b.satuanStok}</td>
        </tr>`).join('');
      }
    }

    function processPrint() {
      const sup = document.getElementById('modalSup').value;
      const pic1 = document.getElementById('modalPic1').value;
      const pic2 = document.getElementById('modalPic2').value;
      const kat = document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text;
      
      document.getElementById('printSub').innerText = "Rekap Bulanan Stok " + kat + " Akhir";
      document.getElementById('printDate').innerText = "Dicetak pada: " + new Date().toLocaleDateString('id-ID');
      document.getElementById('printLocDate').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
      
      // Update tabel print, hapus class warna agar netral
      let tableContent = document.getElementById('tbodyStok').innerHTML
        .replace(/text-emerald-400/g, '')
        .replace(/text-slate-400/g, '')
        .replace(/text-slate-950/g, '');
        
      document.getElementById('printTbody').innerHTML = tableContent;
      
      const signers = [{r: "Supervisor", n: sup}, {r: "PIC 1", n: pic1}, {r: "PIC 2", n: pic2}].filter(s => s.n.trim() !== "");
      let ttdHtml = '';
      signers.forEach(s => { ttdHtml += `<div class="ttd-box"><p>${s.r}</p><br><br><br><p class="nama-ttd">${s.n}</p></div>`; });
      document.getElementById('printTTD').innerHTML = ttdHtml;
      
      document.getElementById('modalPrint').classList.add('hidden');
      window.print();
    }
  </script>
</body>
</html>
