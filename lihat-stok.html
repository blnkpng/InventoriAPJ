<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; }

    /* CSS KHUSUS PRINT PDF */
    @media print {
      body { background: white !important; color: black !important; }
      .no-print { display: none !important; }
      #printArea { display: block !important; width: 100%; }
      
      /* Reset warna ke hitam putih */
      * { color: black !important; background: transparent !important; }
      
      /* Format A4 & Margin */
      @page { size: A4 portrait; margin: 1cm; }
      
      /* Tabel Bersih (Tanpa warna tailwind) */
      table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 12px; }
      th, td { border: 1px solid black !important; padding: 6px !important; text-align: left; }
      th { font-weight: bold; background: #eee !important; }
      
      /* TTD */
      #printTTD { margin-top: 30px; display: flex; justify-content: space-around; width: 100%; }
      .ttd-box { width: 30%; text-align: center; }
    }
  </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <div id="modalPrint" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50 p-4 no-print">
    <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl">
      <h3 class="text-white font-bold mb-4">Data Penandatangan</h3>
      <input type="text" id="modalSup" placeholder="Supervisor" class="w-full mb-3 bg-slate-800 p-2 rounded text-white text-sm border border-slate-600">
      <input type="text" id="modalPic1" placeholder="PIC 1" class="w-full mb-3 bg-slate-800 p-2 rounded text-white text-sm border border-slate-600">
      <input type="text" id="modalPic2" placeholder="PIC 2" class="w-full mb-6 bg-slate-800 p-2 rounded text-white text-sm border border-slate-600">
      <div class="flex gap-3">
        <button onclick="document.getElementById('modalPrint').classList.add('hidden')" class="flex-1 bg-slate-700 py-2 rounded text-sm text-white">Batal</button>
        <button onclick="processPrint()" class="flex-1 bg-emerald-600 py-2 rounded text-sm text-white font-bold">Sudah Sesuai</button>
      </div>
    </div>
  </div>

  <main class="flex-1 flex flex-col bg-slate-900 overflow-y-auto no-print">
    <div class="p-8 max-w-[1000px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        <div class="flex gap-4 mb-8">
           <select id="kategoriSelect" onchange="loadStokData()" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white">
            <option value="" disabled selected>-- Pilih Kategori --</option>
           </select>
           <button onclick="document.getElementById('modalPrint').classList.remove('hidden')" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold">Simpan Sebagai PDF</button>
        </div>
        <div class="border border-slate-800 rounded-lg overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-900 text-xs text-slate-400 border-b border-slate-800 uppercase">
                    <tr><th class="p-4">ID Barang</th><th class="p-4">Nama Barang</th><th class="p-4 text-center">Qty Stok</th><th class="p-4 text-center">Satuan</th></tr>
                </thead>
                <tbody id="tbodyStok"></tbody>
            </table>
        </div>
      </div>
    </div>
  </main>

  <div id="printArea" class="hidden">
    <div style="text-align: center; font-weight: bold; font-size: 20px;">AMPERA PAK JENGGOT</div>
    <div style="text-align: center; font-style: italic; margin-bottom: 20px;" id="printSub">Rekap bulanan stok akhir</div>
    <div style="text-align: center; font-size: 12px; margin-bottom: 20px;" id="printDate"></div>
    
    <table id="printTable">
      <thead><tr><th>ID Barang</th><th>Nama Barang</th><th>Qty Stok</th><th>Satuan</th></tr></thead>
      <tbody id="printTbody"></tbody>
    </table>

    <div style="margin-top: 30px; margin-bottom: 50px;">
        Kami yang bertanda tangan dibawah ini menyatakan stok akhir telah sesuai.<br>
        Batu, <span id="printLocDate"></span>
    </div>
    
    <div id="printTTD"></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    
    document.addEventListener('DOMContentLoaded', () => {
      const nama = localStorage.getItem('APJ_USER_NAME') || '';
      document.getElementById('modalSup').value = nama;
      document.getElementById('modalPic1').value = nama;
      
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(k => { if(perms[k.key] === 'Y') document.getElementById('kategoriSelect').innerHTML += `<option value="${k.sheet}">${k.label}</option>`; });
    });

    async function loadStokData() {
      const sh = document.getElementById('kategoriSelect').value;
      const tbody = document.getElementById('tbodyStok');
      tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-500">Memuat...</td></tr>';
      
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
      let html = '';
      if(res.success) {
        res.data.forEach(b => {
          html += `<tr class="border-b border-slate-800/50 bg-slate-950">
            <td class="p-4 text-sm text-slate-400">${b.id}</td>
            <td class="p-4 text-sm font-medium text-white">${b.nama}</td>
            <td class="p-4 text-center font-bold text-emerald-400">${b.stokTersedia}</td>
            <td class="p-4 text-center text-sm text-slate-400">${b.satuanStok}</td>
          </tr>`;
        });
      }
      tbody.innerHTML = html;
    }

    function processPrint() {
      const sup = document.getElementById('modalSup').value;
      const pic1 = document.getElementById('modalPic1').value;
      const pic2 = document.getElementById('modalPic2').value;
      const katText = document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text;
      
      document.getElementById('printSub').innerText = "Rekap bulanan stok " + katText + " akhir";
      document.getElementById('printDate').innerText = "Dicetak pada tanggal: " + new Date().toLocaleDateString('id-ID');
      document.getElementById('printLocDate').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
      document.getElementById('printTbody').innerHTML = document.getElementById('tbodyStok').innerHTML;
      
      // TTD Dinamis dengan Class CSS print
      const signers = [{r: "Supervisor", n: sup}, {r: "PIC 1", n: pic1}, {r: "PIC 2", n: pic2}].filter(s => s.n.trim() !== "");
      let ttdHtml = '<div style="display:flex; justify-content:space-around;">';
      signers.forEach(s => {
          ttdHtml += `<div class="ttd-box"><p>${s.r}</p><br><br><br><p>(${s.n})</p></div>`;
      });
      ttdHtml += '</div>';
      document.getElementById('printTTD').innerHTML = ttdHtml;
      
      document.getElementById('modalPrint').classList.add('hidden');
      window.print();
    }
  </script>
</body>
</html>
