<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; margin: 0; padding: 0; }
    
    /* ======== LAYOUT KHUSUS PRINT PDF ======== */
    @media print {
      /* Sembunyikan UI Web secara Total */
      .web-ui, #modalPrint { display: none !important; }
      
      /* Hapus Header & Footer Bawaan Browser */
      @page { size: A4 portrait; margin: 0; }
      
      body { background: white !important; color: black !important; }
      
      /* Pembungkus Halaman Cetak (Normal Flow) */
      #printArea { 
        display: block !important; 
        padding: 1cm 1.5cm; 
        box-sizing: border-box;
        font-family: 'Times New Roman', serif;
      }
      
      /* Kop Surat */
      .kop-surat { text-align: center; border-bottom: 3px solid black; padding-bottom: 8px; margin-bottom: 15px; }
      .kop-title { font-weight: bold; font-size: 20pt; color: black !important; margin-bottom: 2px; }
      .kop-sub { font-style: italic; font-size: 12pt; color: black !important; margin-bottom: 2px; }
      .kop-nomor { font-size: 10pt; font-weight: normal; color: black !important; }
      
      /* WADAH TABEL */
      #printTableContainer { margin-bottom: 30px; } /* Jarak ideal antara tabel dan area TTD */
      
      /* TABEL */
      table { width: 100%; border-collapse: collapse; font-size: 10pt; color: black !important; }
      th, td { border: 1px solid black !important; padding: 4px !important; color: black !important; }
      th { background-color: #f0f0f0 !important; text-align: center !important; font-weight: bold !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      
      /* Aturan Isi Tabel */
      #printTbody td { font-weight: normal !important; text-align: center !important; background: transparent !important; }
      #printTbody td:nth-child(2) { text-align: left !important; }
      
      /* FOOTER / AREA TTD */
      #printFooter { page-break-inside: avoid; }
      .print-loc { text-align: center; margin-bottom: 15px; font-size: 10pt; color: black !important; }
      .ttd-container { display: flex; justify-content: space-around; width: 100%; }
      .ttd-box { text-align: center; width: 33%; color: black !important; }
      .role-label { font-weight: bold; color: black !important; font-size: 10pt; text-transform: uppercase; }
      .name-label { font-weight: bold; text-decoration: underline; margin-top: 60px; color: black !important; font-size: 10pt;}
    }
  

    /* ================= APJ INVENTORI v15 UI PRO ================= */
    :root {
      --apj-blue: #3b82f6;
      --apj-sky: #38bdf8;
      --apj-emerald: #34d399;
      --apj-amber: #f59e0b;
      --apj-rose: #fb7185;
      --apj-violet: #a78bfa;
      --apj-bg: #0f172a;
      --apj-card: rgba(15, 23, 42, .86);
    }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 0% 0%, rgba(59,130,246,.18), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(167,139,250,.14), transparent 24%),
        radial-gradient(circle at 80% 100%, rgba(52,211,153,.10), transparent 30%),
        #0f172a !important;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.72), transparent 72%);
    }
    aside, main, #customToast, .apj-help-fab, .apj-mobile-menu, .apj-sidebar-backdrop, .apj-guide-modal { position: relative; z-index: 1; }
    aside {
      background: linear-gradient(180deg, rgba(2,6,23,.98), rgba(15,23,42,.96)) !important;
      border-right-color: rgba(51,65,85,.85) !important;
      box-shadow: 18px 0 50px rgba(0,0,0,.18);
    }
    aside nav a {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
    }
    aside nav a::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,.08), transparent 45%);
      opacity: 0;
      transform: translateX(-30%);
      transition: opacity .25s ease, transform .25s ease;
    }
    aside nav a:hover::after { opacity: 1; transform: translateX(0); }
    .apj-nav-ico {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 10px;
      background: rgba(15,23,42,.85);
      border: 1px solid rgba(148,163,184,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .apj-active-link {
      background: linear-gradient(135deg, rgba(59,130,246,.18), rgba(14,165,233,.08)) !important;
      border-color: rgba(59,130,246,.35) !important;
      color: #fff !important;
      box-shadow: 0 14px 35px rgba(37,99,235,.12);
    }
    .apj-card-glow, .bg-slate-950, .bg-slate-900\/80 {
      box-shadow: 0 22px 70px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .apj-lift, .bg-slate-950.border, .bg-slate-900.border {
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .apj-lift:hover, .bg-slate-950.border:hover {
      transform: translateY(-2px);
      border-color: rgba(96,165,250,.35) !important;
      box-shadow: 0 24px 70px rgba(15,23,42,.38), 0 0 0 1px rgba(96,165,250,.06) inset;
    }
    .apj-soft-animate { animation: apjSoftEnter .45s ease-out both; }
    @keyframes apjSoftEnter { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes apjPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.35); } 50% { box-shadow: 0 0 0 10px rgba(59,130,246,0); } }
    .apj-help-fab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 60;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(96,165,250,.35);
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(14,165,233,.9));
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 22px 60px rgba(37,99,235,.32);
      transition: transform .2s ease, filter .2s ease;
      animation: apjPulse 2.2s ease-in-out infinite;
    }
    .apj-help-fab:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.08); }
    .apj-guide-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .apj-guide-modal.show { display: flex; }
    .apj-guide-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(2,6,23,.82);
      backdrop-filter: blur(10px);
    }
    .apj-guide-card {
      position: relative;
      width: min(760px, 100%);
      max-height: 90dvh;
      overflow: auto;
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,.22);
      background: linear-gradient(180deg, rgba(15,23,42,.98), rgba(2,6,23,.98));
      box-shadow: 0 30px 120px rgba(0,0,0,.55);
      padding: 22px;
      transform: translateY(10px) scale(.98);
      opacity: 0;
      transition: transform .24s ease, opacity .24s ease;
    }
    .apj-guide-modal.show .apj-guide-card { transform: translateY(0) scale(1); opacity: 1; }
    .apj-guide-title {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }
    .apj-guide-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(14,165,233,.10));
      border: 1px solid rgba(96,165,250,.28);
    }
    .apj-guide-steps { display: grid; gap: 10px; margin: 16px 0; }
    .apj-guide-step {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(71,85,105,.55);
    }
    .apj-step-no {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }
    .apj-guide-note {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(245,158,11,.28);
      background: rgba(120,53,15,.20);
      color: #fde68a;
      font-size: 13px;
      line-height: 1.6;
    }
    .apj-guide-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }
    .apj-btn-soft {
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.25);
      background: rgba(15,23,42,.9);
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
    }
    .apj-btn-primary {
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 14px 40px rgba(37,99,235,.22);
    }
    .apj-mobile-menu {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 70;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(2,6,23,.88);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .apj-sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 65;
      display: none;
      background: rgba(2,6,23,.68);
      backdrop-filter: blur(7px);
    }
    .apj-sidebar-backdrop.show { display: block; }
    @media (max-width: 1023px) {
      body { min-height: 100dvh; }
      .apj-mobile-menu { display: inline-flex; }
      aside {
        position: fixed !important;
        inset: 0 auto 0 0 !important;
        width: min(290px, 86vw) !important;
        z-index: 80 !important;
        transform: translateX(-105%);
        transition: transform .28s ease !important;
      }
      aside.apj-open { transform: translateX(0) !important; }
      main header { padding-left: 68px !important; }
      input, select, textarea { font-size: 16px !important; }
      .apj-help-fab { right: 14px; bottom: 14px; padding: 11px 13px; }
      .apj-help-fab span:last-child { display: none; }
    }
    @media print {
      .apj-help-fab, .apj-guide-modal, .apj-mobile-menu, .apj-sidebar-backdrop { display: none !important; }
      body::before { display: none !important; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }
    /* ================= /APJ INVENTORI v15 UI PRO ================= */

  </style>
</head>
<body data-apj-page="lihat-stok.html">

  <div class="web-ui flex h-screen overflow-hidden antialiased">
    
    <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
      <div class="h-16 flex items-center px-6 border-b border-slate-800 text-white font-bold tracking-wider">APJ INVENTORI</div>
      <nav class="flex-1 py-4 px-3 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Dashboard</a>
        <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Input Stok</a>
        <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Output Stok</a>
        <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:bg-slate-900 rounded-lg text-sm">Stok Opname</a>
        <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-emerald-600/10 text-emerald-500 rounded-lg text-sm border border-emerald-500/20">Lihat Stok</a>
      </nav>
    </aside>

    <main class="flex-1 flex flex-col bg-slate-900 overflow-y-auto">
      <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50">
        <h2 class="text-lg font-semibold text-emerald-400">Laporan Stok Terkini</h2>
      </header>
      <div class="p-8 max-w-[1000px] mx-auto w-full">
        <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
          <div class="flex flex-col md:flex-row gap-4 mb-8">
             <select id="kategoriSelect" onchange="loadStokData()" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white">
              <option value="" disabled selected>-- Pilih Kategori --</option>
             </select>
             <button id="btnSimpanPDF" onclick="bukaModalPrint()" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg text-sm font-semibold hover:bg-emerald-700 transition-colors">Simpan Sebagai PDF</button>
          </div>
          <div class="border border-slate-800 rounded-lg overflow-x-auto">
              <table class="w-full text-left border-collapse">
                  <thead class="bg-slate-900 text-xs text-slate-400 border-b border-slate-800 uppercase">
                      <tr><th class="p-4 text-center">ID Barang</th><th class="p-4">Nama Barang</th><th class="p-4 text-center">Qty Stok</th><th class="p-4 text-center">Satuan</th></tr>
                  </thead>
                  <tbody id="tbodyStok">
                      <tr><td colspan="4" class="p-6 text-center text-slate-500">Pilih kategori di atas untuk memuat data.</td></tr>
                  </tbody>
              </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="modalPrint" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-slate-900 border border-slate-700 p-6 rounded-xl w-full max-w-md shadow-2xl">
      <h3 class="text-white font-bold mb-4">Pilih Penandatangan</h3>
      
      <div class="mb-4">
        <label class="text-xs text-slate-400">Nama Supervisor</label>
        <select id="modalSup" class="w-full bg-slate-800 p-2.5 rounded text-white text-sm border border-slate-600 focus:outline-none focus:border-emerald-500">
          <option value="">-- Pilih Supervisor --</option>
        </select>
      </div>
      
      <div class="mb-4">
        <label class="text-xs text-slate-400">Nama PIC 1</label>
        <select id="modalPic1" class="w-full bg-slate-800 p-2.5 rounded text-white text-sm border border-slate-600 focus:outline-none focus:border-emerald-500">
          <option value="">-- Pilih PIC 1 --</option>
        </select>
      </div>
      
      <div class="mb-6">
        <label class="text-xs text-slate-400">Nama PIC 2 (Opsional)</label>
        <select id="modalPic2" class="w-full bg-slate-800 p-2.5 rounded text-white text-sm border border-slate-600 focus:outline-none focus:border-emerald-500">
          <option value="">-- Tanpa PIC 2 --</option>
        </select>
      </div>
      
      <div class="flex gap-3">
        <button onclick="document.getElementById('modalPrint').classList.add('hidden')" class="flex-1 bg-slate-700 hover:bg-slate-600 py-2 rounded text-sm text-white transition-colors">Batal</button>
        <button onclick="processPrint()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-2 rounded text-sm text-white font-bold transition-colors">Sudah Sesuai</button>
      </div>
    </div>
  </div>

  <div id="printArea" style="display:none;">
    
    <div class="kop-surat">
        <div class="kop-title">AMPERA PAK JENGGOT</div>
        <div class="kop-sub" id="printSub"></div>
        <div class="kop-nomor" id="printNomorSurat"></div>
    </div>
    
    <div id="printTableContainer">
        <table id="printTable">
          <thead><tr><th>ID Barang</th><th>Nama Barang</th><th>Qty Stok</th><th>Satuan</th></tr></thead>
          <tbody id="printTbody"></tbody>
        </table>
    </div>

    <div id="printFooter">
        <div class="print-loc">Batu, <span id="printLocDate"></span></div>
        <div class="ttd-container" id="printTTD"></div>
    </div>

  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let listUserGlobal = [];

    document.addEventListener('DOMContentLoaded', () => {
      // 1. Proteksi Hak Akses Role Admin
      const userLevel = localStorage.getItem('APJ_USER_LEVEL') || '';
      if(userLevel.toLowerCase() === 'admin') {
        const btn = document.getElementById('btnSimpanPDF');
        btn.disabled = true;
        btn.className = "bg-slate-800 text-slate-600 px-6 py-2.5 rounded-lg text-sm font-semibold cursor-not-allowed border border-slate-700/50";
        btn.innerText = "Simpan PDF (Akses Ditolak)";
        btn.title = "Role Admin tidak diizinkan mendownload/mencetak dokumen stok.";
      }

      // 2. Load Kategori
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(k => { if(perms[k.key] === 'Y') document.getElementById('kategoriSelect').innerHTML += `<option value="${k.sheet}">${k.label}</option>`; });

      // 3. Tarik Daftar Nama User
      ambilDataUser();
    });

    async function ambilDataUser() {
      try {
        const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({ action: 'getUsers' }) });
        const result = await response.json();
        if(result.success) {
          listUserGlobal = result.data;
        }
      } catch (e) { console.log("Gagal memuat daftar user."); }
    }

    function bukaModalPrint() {
      const selKategori = document.getElementById('kategoriSelect').value;
      if(!selKategori) { alert("Pilih kategori stok terlebih dahulu!"); return; }

      const supSelect = document.getElementById('modalSup');
      const pic1Select = document.getElementById('modalPic1');
      const pic2Select = document.getElementById('modalPic2');
      
      const currentSup = supSelect.value;
      const currentPic1 = pic1Select.value;
      const currentPic2 = pic2Select.value;

      let optionsHtml = `<option value="">-- Pilih Nama --</option>`;
      listUserGlobal.forEach(nama => { optionsHtml += `<option value="${nama}">${nama}</option>`; });
      
      supSelect.innerHTML = optionsHtml;
      pic1Select.innerHTML = optionsHtml;
      pic2Select.innerHTML = `<option value="">-- Tanpa PIC 2 --</option>` + listUserGlobal.map(nama => `<option value="${nama}">${nama}</option>`).join('');

      const activeUser = localStorage.getItem('APJ_USER_NAME') || '';
      supSelect.value = currentSup || activeUser;
      pic1Select.value = currentPic1 || activeUser;
      pic2Select.value = currentPic2;

      document.getElementById('modalPrint').classList.remove('hidden');
    }

    async function loadStokData() {
      const sh = document.getElementById('kategoriSelect').value;
      const tbody = document.getElementById('tbodyStok');
      if(!sh) return;
      
      tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-slate-500 animate-pulse">Menarik data dari database...</td></tr>';
      
      try {
        const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
        if(res.success) {
          if (res.data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-rose-500">Belum ada data barang.</td></tr>';
          } else {
            tbody.innerHTML = res.data.map(b => `<tr class="border-b border-slate-800 bg-slate-950 hover:bg-slate-900">
                <td class="p-4 text-sm text-slate-400 text-center">${b.id}</td>
                <td class="p-4 text-sm text-white text-left">${b.nama}</td>
                <td class="p-4 text-center font-bold text-emerald-400">${b.stokTersedia}</td>
                <td class="p-4 text-center text-sm text-slate-400 text-center">${b.satuanStok}</td>
            </tr>`).join('');
          }
        }
      } catch (error) {
        tbody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-rose-500">Gagal terhubung ke database.</td></tr>';
      }
    }

    function processPrint() {
      const sup = document.getElementById('modalSup').value;
      const pic1 = document.getElementById('modalPic1').value;
      const pic2 = document.getElementById('modalPic2').value;
      
      if(!sup || !pic1) { alert("Supervisor dan PIC 1 wajib dipilih!"); return; }
      
      const selKategori = document.getElementById('kategoriSelect');
      const katText = selKategori.options[selKategori.selectedIndex].text;
      const prefix = selKategori.value.replace("MASTER_", "").substring(0, 2); 
      
      // Nomor Surat
      const romanMonths = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
      const now = new Date();
      const bRomawi = romanMonths[now.getMonth()];
      const tahun = now.getFullYear();
      const timeCode = String(now.getHours()).padStart(2, '0') + String(now.getMinutes()).padStart(2, '0') + String(now.getSeconds()).padStart(2, '0');
      
      document.getElementById('printNomorSurat').innerText = `No: APJ-INV/REKAP/${prefix}/${bRomawi}/${tahun}/${timeCode}`;
      document.getElementById('printSub').innerText = "Rekap Bulanan Stok " + katText + " Akhir";
      document.getElementById('printLocDate').innerText = now.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
      
      // Format Ulang Tabel untuk Cetak
      let rowsHtml = document.getElementById('tbodyStok').innerHTML;
      rowsHtml = rowsHtml.replace(/text-emerald-400/g, 'text-black')
                         .replace(/text-slate-400/g, 'text-black')
                         .replace(/text-white/g, 'text-black')
                         .replace(/bg-slate-950/g, 'bg-white')
                         .replace(/font-bold/g, 'font-normal'); 
      document.getElementById('printTbody').innerHTML = rowsHtml;
      
      // TTD
      const signers = [{r: "Supervisor", n: sup}, {r: "PIC 1", n: pic1}, {r: "PIC 2", n: pic2}].filter(s => s.n.trim() !== "");
      let ttdHtml = '';
      signers.forEach(s => { 
          ttdHtml += `<div class="ttd-box"><p class="role-label">${s.r}</p><p class="name-label">(${s.n})</p></div>`; 
      });
      document.getElementById('printTTD').innerHTML = ttdHtml;
      
      // Print
      document.getElementById('modalPrint').classList.add('hidden');
      setTimeout(() => { window.print(); }, 150);
    }
  </script>

  function ready(fn){ if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn); else fn(); }
  function fileNameFromHref(href){ try { return (href || '').split('/').pop().split('?')[0].split('#')[0].toLowerCase(); } catch(e){ return ''; } }
  function currentFile(){ return page || fileNameFromHref(location.href); }
  function safe(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function renderSidebar(){
    const nav = document.querySelector('aside nav');
    if (!nav) return;
    const active = currentFile();
    const menu = [
      ['dashboard.html','Dashboard'], ['input-stok.html','Input Stok'], ['output-stok.html','Output Stok'],
      ['transfer-produksi.html','Transfer Produk Outlet'], ['produk-outlet.html','Produk Outlet'],
      ['stok-opname.html','Stok Opname'], ['lihat-stok.html','Lihat Stok'], ['riwayat-transaksi.html','Riwayat Transaksi']
    ];
    nav.innerHTML = '<p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>' + menu.map(([href,label]) => {
      const isActive = active === href;
      const cls = isActive ? 'apj-active-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-semibold text-sm transition-colors' : 'flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors';
      return `<a href="${href}" class="${cls}"><span class="apj-nav-ico">${icons[href] || '•'}</span><span>${label}</span></a>`;
    }).join('');
  }

  function ensureLogout(){
    const aside = document.querySelector('aside');
    if (!aside) return;
    if (aside.textContent.toLowerCase().includes('logout sistem')) return;
    const wrap = document.createElement('div');
    wrap.className = 'p-4 border-t border-slate-800';
    wrap.innerHTML = '<button type="button" onclick="APJUI_logout()" class="flex items-center gap-3 w-full px-3 py-2.5 text-rose-400 hover:text-rose-300 hover:bg-rose-950/50 rounded-lg font-medium text-sm transition-colors border border-transparent hover:border-rose-900/50"><span class="apj-nav-ico">🚪</span><span>Logout Sistem</span></button>';
    aside.appendChild(wrap);
  }

  window.APJUI_logout = function(){
    ['APJ_SESSION_ACTIVE','APJ_USER_NAME','APJ_USER_LEVEL','APJ_USER_PERMISSIONS'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  };

  function setupMobileSidebar(){
    const aside = document.querySelector('aside');
    if (!aside || document.querySelector('.apj-mobile-menu') || document.getElementById('mobileMenuBtn')) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'apj-mobile-menu';
    btn.setAttribute('aria-label','Buka menu');
    btn.innerHTML = '☰';
    const backdrop = document.createElement('div');
    backdrop.className = 'apj-sidebar-backdrop';
    document.body.appendChild(btn);
    document.body.appendChild(backdrop);
    function close(){ aside.classList.remove('apj-open'); backdrop.classList.remove('show'); }
    function open(){ aside.classList.add('apj-open'); backdrop.classList.add('show'); }
    btn.addEventListener('click', open);
    backdrop.addEventListener('click', close);
    aside.addEventListener('click', (e) => { if (e.target.closest('a') && window.innerWidth < 1024) close(); });
  }

  function guideData(){ return guide[currentFile()] || null; }
  function buildGuideModal(){
    const data = guideData();
    if (!data || document.getElementById('apjGuideModal')) return;
    const modal = document.createElement('div');
    modal.id = 'apjGuideModal';
    modal.className = 'apj-guide-modal';
    modal.innerHTML = `
      <div class="apj-guide-backdrop" onclick="APJUI_closeGuide()"></div>

  }

  window.APJUI_openGuide = function(auto){
    const modal = document.getElementById('apjGuideModal');
    if (!modal) return;
    modal.classList.add('show');
    if (auto) localStorage.setItem('APJ_HELP_SEEN_' + currentFile(), 'Y');
  };
  window.APJUI_closeGuide = function(){
    const modal = document.getElementById('apjGuideModal');
    if (modal) modal.classList.remove('show');
  };
  window.APJUI_resetGuideAuto = function(){
    localStorage.removeItem('APJ_HELP_SEEN_' + currentFile());
    window.APJUI_closeGuide();
    setTimeout(() => window.APJUI_openGuide(true), 150);
  };

  function enhanceCards(){
    document.querySelectorAll('.bg-slate-950.border, .bg-slate-900.border').forEach(el => el.classList.add('apj-lift'));

  ready(function(){
