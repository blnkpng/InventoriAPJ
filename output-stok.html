<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; z-index: 9999; }
    .toast.show { top: 24px; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .hidden-soft { display: none !important; }
  </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <div id="customToast" class="toast flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md" role="alert"><div class="ml-3 text-sm font-medium" id="toastMessage"></div></div>

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800"><div class="flex items-center gap-3 text-blue-500"><span class="text-sm font-bold tracking-wider text-white">APJ INVENTORI</span></div></div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Input Stok</a>
      <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-rose-600/10 text-rose-500 rounded-lg font-medium text-sm transition-colors border border-rose-500/20">Output Stok</a>
      <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Stok Opname</a>
      <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
      <h2 class="text-lg font-semibold text-rose-400">Form Output Stok</h2>
      <div class="text-sm font-medium text-slate-400">Petugas: <span id="namaPetugas" class="text-rose-400">Memuat...</span></div>
    </header>

    <div class="p-8 max-w-[1500px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tanggal Keluar</label>
            <input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-rose-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kategori Transaksi</label>
            <select id="kategoriSelect" onchange="handleKategoriChange()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-rose-500 focus:outline-none">
              <option value="" disabled selected>-- Pilih Kategori --</option>
            </select>
          </div>
        </div>

        <div id="modeInfo" class="mb-4 text-xs text-slate-400 bg-slate-900 border border-slate-800 rounded-lg p-3">
          Pilih kategori terlebih dahulu. Mode <b>Produksi</b> akan membuka tabel bahan baku otomatis.
        </div>

        <div class="border border-slate-800 rounded-lg overflow-x-auto mb-6">
          <table class="w-full text-left border-collapse min-w-[1100px]">
            <thead id="tableHead"></thead>
            <tbody id="itemTableBody">
              <tr><td class="p-8 text-center text-slate-500" colspan="9">Pilih kategori untuk mulai input output stok.</td></tr>
            </tbody>
          </table>
          <div class="bg-slate-900 p-3 text-center border-t border-slate-800">
            <button type="button" id="btnTambahBaris" onclick="handleTambahBaris()" class="text-rose-500 hover:text-rose-400 text-sm font-medium flex items-center justify-center gap-2 w-full" disabled>+ Tambah Baris</button>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" id="btnSimpan" class="bg-rose-600 hover:bg-rose-700 text-white px-8 py-3 rounded-lg text-sm font-semibold transition-colors shadow-lg shadow-rose-600/20">Simpan Output Stok</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";

    // CATATAN: Pastikan URL di atas sama dengan Web App aktif. Jika gagal, pakai URL lama Anda:
    // https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec

    let globalListBarang = [];
    let globalProduksiList = [];
    let outletList = [];
    let picList = [];
    let currentMode = ""; // general | produksi
    let produksiGroups = [];

    const KATEGORI_GENERAL = [
      { key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' },
      { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' },
      { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' },
      { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' },
      { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }
    ];

    document.addEventListener('DOMContentLoaded', async () => {
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') { window.location.href = 'index.html'; return; }

      document.getElementById('namaPetugas').textContent = localStorage.getItem('APJ_USER_NAME') || '-';
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];

      buildKategoriOptions();
      await loadOutputInit();
    });

    function buildKategoriOptions() {
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const level = (localStorage.getItem('APJ_USER_LEVEL') || '').toLowerCase();
      const kategoriSelect = document.getElementById('kategoriSelect');

      KATEGORI_GENERAL.forEach(kat => {
        if (perms[kat.key] === 'Y') {
          const op = document.createElement('option');
          op.value = kat.sheet;
          op.dataset.mode = 'general';
          op.textContent = kat.label;
          kategoriSelect.appendChild(op);
        }
      });

      // BARU: kategori Produksi. Jika nanti LEVEL_PERMISSION punya kolom produksi, isi dengan Y.
      const bolehProduksi = perms.produksi === 'Y' || ['owner', 'gudang', 'produksi'].includes(level);
      if (bolehProduksi) {
        const op = document.createElement('option');
        op.value = 'PRODUKSI';
        op.dataset.mode = 'produksi';
        op.textContent = 'Produksi';
        kategoriSelect.appendChild(op);
      }
    }

    async function loadOutputInit() {
      try {
        const res = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({ action: 'getOutputInit' })
        });
        const result = await res.json();
        if (result.success) {
          outletList = result.outlets || [];
          picList = result.pics || [];
        }
      } catch (error) {
        showToast('Gagal memuat Outlet/PIC. Cek koneksi atau URL Apps Script.', 'error');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('customToast');
      document.getElementById('toastMessage').textContent = message;
      toast.className = type === 'success'
        ? "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-emerald-950/90 border-emerald-800 text-emerald-400 backdrop-blur-md"
        : "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-rose-950/90 border-rose-800 text-rose-400 backdrop-blur-md";
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    async function handleKategoriChange() {
      const kategoriSelect = document.getElementById('kategoriSelect');
      const selectedOption = kategoriSelect.options[kategoriSelect.selectedIndex];
      currentMode = selectedOption.dataset.mode;
      globalListBarang = [];
      produksiGroups = [];

      if (currentMode === 'produksi') {
        await loadProduksiMode();
      } else {
        await loadGeneralMode(kategoriSelect.value);
      }
    }

    function setLoadingRow(colspan, text) {
      document.getElementById('itemTableBody').innerHTML = `<tr><td colspan="${colspan}" class="p-8 text-center text-slate-500 italic">${text}</td></tr>`;
      document.getElementById('btnTambahBaris').disabled = true;
    }

    async function loadGeneralMode(sheetName) {
      document.getElementById('modeInfo').innerHTML = 'Mode <b>General</b>: Tujuan <b>Transfer</b> wajib memilih Outlet dan PIC. Tujuan <b>Pusat</b> otomatis menyembunyikan Outlet/PIC.';
      renderGeneralHeader();
      setLoadingRow(9, 'Memuat data barang general...');

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({ action: 'getBarang', sheetName })
        });
        const result = await response.json();
        if (result.success) {
          globalListBarang = result.data || [];
          document.getElementById('itemTableBody').innerHTML = '';
          document.getElementById('btnTambahBaris').innerText = '+ Tambah Baris Barang';
          document.getElementById('btnTambahBaris').disabled = false;
          tambahBarisGeneral();
        } else showToast(result.message, 'error');
      } catch (error) {
        showToast('Koneksi gagal saat memuat barang.', 'error');
      }
    }

    async function loadProduksiMode() {
      document.getElementById('modeInfo').innerHTML = 'Mode <b>Produksi</b>: pilih satu Produksi, sistem otomatis menampilkan semua bahan baku terkait. Qty Produksi hanya muncul satu kali per grup produksi.';
      renderProduksiHeader();
      setLoadingRow(8, 'Memuat master produksi...');

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify({ action: 'getBarangProduksi' })
        });
        const result = await response.json();
        if (result.success) {
          globalProduksiList = result.data || [];
          document.getElementById('btnTambahBaris').innerText = '+ Tambah Item Produksi';
          document.getElementById('btnTambahBaris').disabled = false;
          tambahGrupProduksi();
        } else showToast(result.message, 'error');
      } catch (error) {
        showToast('Koneksi gagal saat memuat produksi.', 'error');
      }
    }

    function renderGeneralHeader() {
      document.getElementById('tableHead').innerHTML = `
        <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
          <th class="p-4 min-w-[240px]">Nama Barang</th>
          <th class="p-4 min-w-[120px] text-center">Stok Tersedia</th>
          <th class="p-4 min-w-[90px] text-center">Satuan</th>
          <th class="p-4 min-w-[130px] text-center">Qty Keluar</th>
          <th class="p-4 min-w-[90px] text-center">Satuan</th>
          <th class="p-4 min-w-[130px]">Tujuan</th>
          <th class="p-4 min-w-[160px]">Outlet</th>
          <th class="p-4 min-w-[160px]">PIC</th>
          <th class="p-4 min-w-[80px] text-center">Aksi</th>
        </tr>`;
    }

    function renderProduksiHeader() {
      document.getElementById('tableHead').innerHTML = `
        <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
          <th class="p-4 min-w-[230px]">Produksi</th>
          <th class="p-4 min-w-[220px]">Bahan Baku</th>
          <th class="p-4 min-w-[120px] text-center">Stok Tersedia</th>
          <th class="p-4 min-w-[90px] text-center">Satuan</th>
          <th class="p-4 min-w-[130px] text-center">Qty Keluar</th>
          <th class="p-4 min-w-[90px] text-center">Satuan</th>
          <th class="p-4 min-w-[130px] text-center">Qty Produksi</th>
          <th class="p-4 min-w-[130px] text-center">Satuan Produksi</th>
        </tr>`;
    }

    function handleTambahBaris() {
      if (currentMode === 'produksi') tambahGrupProduksi();
      else tambahBarisGeneral();
    }

    function optionBarangHtml() {
      return globalListBarang.map(b =>
        `<option value="${escapeHtml(b.id)}" data-nama="${escapeHtml(b.nama)}" data-sat="${escapeHtml(b.satuanStok)}" data-stok="${escapeHtml(b.stokTersedia)}">[${escapeHtml(b.id)}] ${escapeHtml(b.nama)}</option>`
      ).join('');
    }

    function optionSimpleHtml(list, placeholder) {
      return `<option value="">${placeholder}</option>` + list.map(item => `<option value="${escapeHtml(item)}">${escapeHtml(item)}</option>`).join('');
    }

    function tambahBarisGeneral() {
      const tbody = document.getElementById('itemTableBody');
      const tr = document.createElement('tr');
      tr.className = 'border-b border-slate-800/50 bg-slate-950 item-row';
      tr.innerHTML = `
        <td class="p-3"><select onchange="updateGeneralBarang(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang"><option value="">-- Pilih Barang --</option>${optionBarangHtml()}</select></td>
        <td class="p-3 text-center text-sm font-bold text-emerald-400 label-stok-tersedia">0</td>
        <td class="p-3 text-center text-sm font-bold text-slate-500 label-sat-1">-</td>
        <td class="p-3"><input type="number" step="any" min="0.001" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white text-center input-qty" placeholder="0"></td>
        <td class="p-3 text-center text-sm font-bold text-rose-400 label-sat-2">-</td>
        <td class="p-3"><select onchange="handleTujuanChange(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-tujuan"><option value="Transfer">Transfer</option><option value="Pusat">Pusat</option></select></td>
        <td class="p-3 outlet-cell"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-outlet">${optionSimpleHtml(outletList, '-- Pilih Outlet --')}</select></td>
        <td class="p-3 pic-cell"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-pic">${optionSimpleHtml(picList, '-- Pilih PIC --')}</select></td>
        <td class="p-3 text-center"><button type="button" class="text-slate-600 hover:text-rose-500 text-sm font-medium" onclick="this.closest('tr').remove()">Hapus</button></td>
      `;
      tbody.appendChild(tr);
    }

    function updateGeneralBarang(sel) {
      const selectedOpt = sel.options[sel.selectedIndex];
      const sat = selectedOpt.getAttribute('data-sat') || '-';
      const stok = selectedOpt.getAttribute('data-stok') || '0';
      const row = sel.closest('tr');
      row.querySelector('.label-sat-1').innerText = sat;
      row.querySelector('.label-sat-2').innerText = sat;
      row.querySelector('.label-stok-tersedia').innerText = stok;
    }

    function handleTujuanChange(sel) {
      const row = sel.closest('tr');
      const isPusat = sel.value === 'Pusat';
      row.querySelector('.outlet-cell').classList.toggle('hidden-soft', isPusat);
      row.querySelector('.pic-cell').classList.toggle('hidden-soft', isPusat);
      if (isPusat) {
        row.querySelector('.input-outlet').value = '';
        row.querySelector('.input-pic').value = '';
      }
    }

    function produksiOptionHtml(selectedValue) {
      return `<option value="">-- Pilih Produksi --</option>` + globalProduksiList.map(p => {
        const selected = p.produksi === selectedValue ? 'selected' : '';
        return `<option value="${escapeHtml(p.produksi)}" ${selected}>${escapeHtml(p.produksi)}</option>`;
      }).join('');
    }

    function tambahGrupProduksi() {
      produksiGroups.push({
        key: 'grp-' + Date.now() + '-' + Math.random().toString(16).slice(2),
        produksi: '',
        qtyProduksi: '',
        bahanQty: {}
      });
      renderProduksiBody();
    }

    function updateProduksiGroup(groupKey, selectEl) {
      const group = produksiGroups.find(g => g.key === groupKey);
      if (!group) return;
      group.produksi = selectEl.value;
      group.qtyProduksi = '';
      group.bahanQty = {};
      renderProduksiBody();
    }

    function updateQtyProduksi(groupKey, inputEl) {
      const group = produksiGroups.find(g => g.key === groupKey);
      if (group) group.qtyProduksi = inputEl.value;
    }

    function updateQtyBahan(groupKey, bahanKey, inputEl) {
      const group = produksiGroups.find(g => g.key === groupKey);
      if (group) group.bahanQty[bahanKey] = inputEl.value;
    }

    function removeProduksiGroup(groupKey) {
      produksiGroups = produksiGroups.filter(g => g.key !== groupKey);
      renderProduksiBody();
    }

    function getProduksiData(namaProduksi) {
      return globalProduksiList.find(p => p.produksi === namaProduksi);
    }

    function renderProduksiBody() {
      const tbody = document.getElementById('itemTableBody');
      tbody.innerHTML = '';

      if (!produksiGroups.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="p-8 text-center text-slate-500">Belum ada item produksi.</td></tr>';
        return;
      }

      produksiGroups.forEach(group => {
        const produksiData = getProduksiData(group.produksi);

        if (!produksiData) {
          const tr = document.createElement('tr');
          tr.className = 'border-b border-slate-800/50 bg-slate-950 produksi-row';
          tr.innerHTML = `
            <td class="p-3"><select onchange="updateProduksiGroup('${group.key}', this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-produksi">${produksiOptionHtml(group.produksi)}</select></td>
            <td colspan="5" class="p-3 text-sm text-slate-500 italic">Pilih produksi untuk menampilkan bahan baku otomatis.</td>
            <td colspan="2" class="p-3 text-right"><button type="button" onclick="removeProduksiGroup('${group.key}')" class="text-slate-600 hover:text-rose-500 text-sm font-medium">Hapus</button></td>
          `;
          tbody.appendChild(tr);
          return;
        }

        const bahanList = produksiData.bahan || [];
        const rowSpan = Math.max(bahanList.length, 1);

        bahanList.forEach((bahan, index) => {
          const bahanKey = bahan.idBarang + '|' + bahan.bahanBaku;
          const tr = document.createElement('tr');
          tr.className = 'border-b border-slate-800/50 bg-slate-950 produksi-row';

          let firstCells = '';
          let lastCells = '';
          if (index === 0) {
            firstCells = `
              <td class="p-3 align-top" rowspan="${rowSpan}">
                <select onchange="updateProduksiGroup('${group.key}', this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-produksi mb-3">${produksiOptionHtml(group.produksi)}</select>
                <button type="button" onclick="removeProduksiGroup('${group.key}')" class="text-slate-600 hover:text-rose-500 text-sm font-medium">Hapus Grup</button>
              </td>`;
            lastCells = `
              <td class="p-3 align-top" rowspan="${rowSpan}"><input type="number" min="0.001" step="any" value="${escapeHtml(group.qtyProduksi)}" oninput="updateQtyProduksi('${group.key}', this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white text-center input-qty-produksi" placeholder="0"></td>
              <td class="p-3 align-top text-center text-sm font-bold text-amber-400" rowspan="${rowSpan}">${escapeHtml(produksiData.satuanProduksi || '-')}</td>`;
          }

          tr.innerHTML = `
            ${firstCells}
            <td class="p-3 text-sm text-white"><div class="font-semibold">${escapeHtml(bahan.bahanBaku)}</div><div class="text-[10px] text-slate-500">ID: ${escapeHtml(bahan.idBarang)}</div></td>
            <td class="p-3 text-center text-sm font-bold text-emerald-400">${escapeHtml(bahan.stokTersedia)}</td>
            <td class="p-3 text-center text-sm font-bold text-slate-500">${escapeHtml(bahan.satuanBahan)}</td>
            <td class="p-3"><input type="number" min="0.001" step="any" value="${escapeHtml(group.bahanQty[bahanKey] || '')}" oninput="updateQtyBahan('${group.key}', '${escapeJs(bahanKey)}', this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white text-center input-qty-keluar" placeholder="0"></td>
            <td class="p-3 text-center text-sm font-bold text-rose-400">${escapeHtml(bahan.satuanBahan)}</td>
            ${lastCells}
          `;
          tbody.appendChild(tr);
        });
      });
    }

    document.getElementById('btnSimpan').addEventListener('click', async () => {
      if (currentMode === 'produksi') await simpanProduksi();
      else await simpanGeneral();
    });

    async function simpanGeneral() {
      const tanggal = document.getElementById('tanggalInput').value;
      const petugas = localStorage.getItem('APJ_USER_NAME') || '';
      const kategoriSelect = document.getElementById('kategoriSelect');
      const kategori = kategoriSelect.options[kategoriSelect.selectedIndex]?.text || '';
      let data = [];
      let errorMessage = '';

      document.querySelectorAll('.item-row').forEach(row => {
        const sel = row.querySelector('.select-barang');
        const qty = row.querySelector('.input-qty').value;
        const tujuan = row.querySelector('.input-tujuan').value;
        const outlet = row.querySelector('.input-outlet').value;
        const pic = row.querySelector('.input-pic').value;

        if (!sel.value) return;
        if (!(parseNumber(qty) > 0)) errorMessage = 'Qty Keluar wajib lebih dari 0.';
        if (tujuan === 'Transfer' && (!outlet || !pic)) errorMessage = 'Tujuan Transfer wajib isi Outlet dan PIC.';

        data.push([
          tanggal,
          petugas,
          kategori,
          sel.value,
          sel.options[sel.selectedIndex].getAttribute('data-nama') || sel.options[sel.selectedIndex].text.split('] ')[1],
          qty,
          row.querySelector('.label-sat-2').innerText,
          tujuan,
          tujuan === 'Pusat' ? '' : outlet,
          tujuan === 'Pusat' ? '' : pic
        ]);
      });

      if (!tanggal || !kategoriSelect.value) return showToast('Tanggal dan kategori wajib diisi.', 'error');
      if (!data.length) return showToast('Pilih minimal 1 barang.', 'error');
      if (errorMessage) return showToast(errorMessage, 'error');

      await submitData({ action: 'simpanTransaksi', sheetName: 'TRANSAKSI_OUTPUT_STOK', data }, 'Simpan Output Stok');
    }

    async function simpanProduksi() {
      const tanggal = document.getElementById('tanggalInput').value;
      const petugas = localStorage.getItem('APJ_USER_NAME') || '';
      let data = [];
      let errorMessage = '';

      if (!tanggal) return showToast('Tanggal wajib diisi.', 'error');

      produksiGroups.forEach(group => {
        const produksiData = getProduksiData(group.produksi);
        if (!produksiData) {
          errorMessage = 'Ada grup produksi yang belum dipilih.';
          return;
        }

        if (!(parseNumber(group.qtyProduksi) > 0)) {
          errorMessage = 'Qty Produksi wajib lebih dari 0.';
          return;
        }

        produksiData.bahan.forEach(bahan => {
          const bahanKey = bahan.idBarang + '|' + bahan.bahanBaku;
          const qtyKeluar = group.bahanQty[bahanKey];

          if (!(parseNumber(qtyKeluar) > 0)) {
            errorMessage = 'Semua Qty Keluar bahan baku produksi wajib diisi.';
            return;
          }

          data.push([
            tanggal,
            petugas,
            bahan.idBarang,
            produksiData.produksi,
            qtyKeluar,
            bahan.satuanBahan,
            group.qtyProduksi,
            produksiData.satuanProduksi
          ]);
        });
      });

      if (!produksiGroups.length || !data.length) return showToast('Pilih minimal 1 item produksi.', 'error');
      if (errorMessage) return showToast(errorMessage, 'error');

      await submitData({ action: 'simpanOutputProduksi', data }, 'Simpan Output Stok');
    }

    async function submitData(payload, defaultButtonText) {
      const btn = document.getElementById('btnSimpan');
      btn.disabled = true;
      btn.innerText = 'Menyimpan...';

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          redirect: 'follow',
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.success) {
          showToast(result.message, 'success');
          setTimeout(() => location.reload(), 1500);
        } else {
          showToast(result.message || 'Gagal menyimpan.', 'error');
          btn.disabled = false;
          btn.innerText = defaultButtonText;
        }
      } catch (error) {
        showToast('Gagal terhubung ke server.', 'error');
        btn.disabled = false;
        btn.innerText = defaultButtonText;
      }
    }

    function parseNumber(value) {
      if (value === null || typeof value === 'undefined' || value === '') return 0;
      return parseFloat(String(value).replace(',', '.')) || 0;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[c]));
    }

    function escapeJs(value) {
      return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
    }
  </script>
