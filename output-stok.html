<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { font-family: sans-serif; background-color: #0f172a; color: #f8fafc; } </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800"><span class="text-white font-bold">APJ INVENTORI</span></div>
    <nav class="flex-1 py-4 px-3 space-y-1">
      <a href="dashboard.html" class="block px-3 py-2 text-slate-400 hover:bg-slate-900 rounded">Dashboard</a>
      <a href="input-stok.html" class="block px-3 py-2 text-slate-400 hover:bg-slate-900 rounded">Input Stok</a>
      <a href="output-stok.html" class="block px-3 py-2 bg-rose-600/10 text-rose-500 rounded font-bold border border-rose-500/20">Output Stok</a>
      <a href="stok-opname.html" class="block px-3 py-2 text-slate-400 hover:bg-slate-900 rounded">Stok Opname</a>
      <a href="lihat-stok.html" class="block px-3 py-2 text-slate-400 hover:bg-slate-900 rounded">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center px-8 border-b border-slate-800 bg-slate-900/50">
      <h2 class="text-lg font-semibold text-rose-400">Form Output Stok</h2>
    </header>

    <div class="p-8 max-w-[1400px] w-full">
      <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-xl">
        <div class="grid grid-cols-2 gap-6 mb-8">
          <div>
            <label class="block text-xs text-slate-400 mb-2">Tanggal</label>
            <input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 p-2.5 rounded text-white">
          </div>
          <div>
            <label class="block text-xs text-slate-400 mb-2">Kategori Transaksi</label>
            <select id="kategoriSelect" onchange="renderTable()" class="w-full bg-slate-900 border border-slate-700 p-2.5 rounded text-white">
              <option value="">-- Pilih Kategori --</option>
            </select>
          </div>
        </div>

        <table class="w-full border-collapse border border-slate-800 text-sm">
          <thead id="tableHeader" class="bg-slate-900 text-slate-400 uppercase text-xs"></thead>
          <tbody id="itemTableBody"></tbody>
        </table>
        
        <button id="btnTambahBaris" onclick="addRow()" class="mt-4 bg-slate-800 px-4 py-2 rounded text-sm">+ Tambah Baris</button>
        <button id="btnSimpan" onclick="simpanData()" class="mt-4 bg-rose-600 px-6 py-2 rounded text-sm font-bold">Simpan Transaksi</button>
      </div>
    </div>
  </main>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let listBarang = [], listProd = [], listOutlet = [], listUser = [];

    async function init() {
      const res = await (await fetch(URL, {method:'POST', body:JSON.stringify({action:'getKategori'})})).json();
      const s = document.getElementById('kategoriSelect');
      res.data.forEach(k => s.innerHTML += `<option value="${k.sheet}">${k.label}</option>`);
      s.innerHTML += `<option value="MASTER_BARANG_PRODUKSI">PRODUKSI</option>`;
      
      const [u, o, p] = await Promise.all([
        fetch(URL, {method:'POST', body:JSON.stringify({action:'getUsers'})}).then(r=>r.json()),
        fetch(URL, {method:'POST', body:JSON.stringify({action:'getOutlets'})}).then(r=>r.json()),
        fetch(URL, {method:'POST', body:JSON.stringify({action:'getProduksiMaster'})}).then(r=>r.json())
      ]);
      listUser = u.data; listOutlet = o.data; listProd = p.data;
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];
    }

    async function renderTable() {
      const sh = document.getElementById('kategoriSelect').value;
      const th = document.getElementById('tableHeader');
      if(sh === 'MASTER_BARANG_PRODUKSI') {
        th.innerHTML = `<tr><th class="p-3 border">Produksi</th><th class="p-3 border">Bahan</th><th class="p-3 border">Qty Out</th><th class="p-3 border">Sat</th><th class="p-3 border">Qty Prod</th><th class="p-3 border">Sat</th><th class="p-3 border">Aksi</th></tr>`;
      } else {
        listBarang = (await (await fetch(URL, {method:'POST', body:JSON.stringify({action:'getBarang', sheetName: sh})})).json()).data;
        th.innerHTML = `<tr><th class="p-3 border">Barang</th><th class="p-3 border">Stok</th><th class="p-3 border">Qty Out</th><th class="p-3 border">Tujuan</th><th class="p-3 border">Outlet</th><th class="p-3 border">PIC</th><th class="p-3 border">Ket</th><th class="p-3 border">Aksi</th></tr>`;
      }
      document.getElementById('itemTableBody').innerHTML = ''; addRow();
    }

    function addRow() {
      const sh = document.getElementById('kategoriSelect').value;
      const tb = document.getElementById('itemTableBody');
      const tr = document.createElement('tr');
      tr.className = "item-row border-b border-slate-800";
      if(sh === 'MASTER_BARANG_PRODUKSI') {
        const menus = [...new Set(listProd.map(i=>i.namaProduksi))];
        tr.innerHTML = `<td class="p-2 border"><select class="w-full bg-slate-900 select-prod" onchange="updProd(this)"><option>--Pilih--</option>${menus.map(m=>`<option>${m}</option>`).join('')}</select><input type="hidden" class="id-resep"></td>
                        <td class="p-2 border"><select class="w-full bg-slate-900 select-bahan"></select></td>
                        <td class="p-2 border"><input type="number" class="w-full bg-slate-900 qty-out"></td><td class="sat-bahan p-2 border">-</td>
                        <td class="p-2 border"><input type="number" class="w-full bg-slate-900 qty-prod"></td><td class="sat-prod p-2 border">-</td>
                        <td class="p-2 border"><button onclick="this.closest('tr').remove()">X</button></td>`;
      } else {
        tr.innerHTML = `<td class="p-2 border"><select class="w-full bg-slate-900 select-brg" onchange="updStd(this)"><option>--Pilih--</option>${listBarang.map(b=>`<option value="${b.id}" data-stok="${b.stok}" data-sat="${b.satuan}">${b.nama}</option>`).join('')}</select></td>
                        <td class="stok-sisa p-2 border">-</td><td><input type="number" class="w-full bg-slate-900 qty-out"></td>
                        <td class="p-2 border"><select class="w-full bg-slate-900 select-tujuan" onchange="toggleT(this)"><option>Pakai</option><option>Transfer</option></select></td>
                        <td class="p-2 border"><select class="w-full bg-slate-900 select-outlet" disabled>${listOutlet.map(o=>`<option>${o}</option>`).join('')}</select></td>
                        <td class="p-2 border"><select class="w-full bg-slate-900 select-pic" disabled>${listUser.map(u=>`<option>${u}</option>`).join('')}</select></td>
                        <td class="p-2 border"><input type="text" class="w-full bg-slate-900 input-ket"></td>
                        <td class="p-2 border"><button onclick="this.closest('tr').remove()">X</button></td>`;
      }
      tb.appendChild(tr);
    }

    function updProd(sel) {
      const tr = sel.closest('tr');
      const bSel = tr.querySelector('.select-bahan');
      const filtered = listProd.filter(i=>i.namaProduksi === sel.value);
      bSel.innerHTML = filtered.map(i=>`<option data-id="${i.idResep}" data-sb="${i.satuanBahan}" data-sp="${i.satuanProduksi}">${i.bahanMentah}</option>`).join('');
      bSel.onchange = () => {
         const opt = bSel.options[bSel.selectedIndex];
         tr.querySelector('.id-resep').value = opt.getAttribute('data-id');
         tr.querySelector('.sat-bahan').innerText = opt.getAttribute('data-sb');
         tr.querySelector('.sat-prod').innerText = opt.getAttribute('data-sp');
      };
      bSel.onchange();
    }

    function updStd(sel) {
      const opt = sel.options[sel.selectedIndex];
      const tr = sel.closest('tr');
      tr.querySelector('.stok-sisa').innerText = opt.getAttribute('data-stok');
    }

    function toggleT(sel) {
      const tr = sel.closest('tr');
      tr.querySelector('.select-outlet').disabled = tr.querySelector('.select-pic').disabled = (sel.value !== 'Transfer');
    }

    async function simpanData() {
        const sh = document.getElementById('kategoriSelect').value;
        const data = [];
        document.querySelectorAll('.item-row').forEach(r => {
           if(sh === 'MASTER_BARANG_PRODUKSI') {
               data.push([document.getElementById('tanggalInput').value, localStorage.getItem('APJ_USER_NAME'), r.querySelector('.id-resep').value, r.querySelector('.select-prod').value + " ("+r.querySelector('.select-bahan').value+")", r.querySelector('.qty-out').value, r.querySelector('.sat-bahan').innerText, r.querySelector('.qty-prod').value, r.querySelector('.sat-prod').innerText]);
           } else {
               data.push([document.getElementById('tanggalInput').value, localStorage.getItem('APJ_USER_NAME'), r.querySelector('.select-brg').value, r.querySelector('.qty-out').value, r.querySelector('.select-tujuan').value, r.querySelector('.select-outlet').value, r.querySelector('.select-pic').value, r.querySelector('.input-ket').value]);
           }
        });
        const res = await (await fetch(URL, {method:'POST', body:JSON.stringify({action:'simpanTransaksi', sheetName: sh === 'MASTER_BARANG_PRODUKSI' ? 'OUTPUT_PRODUKSI' : 'OUTPUT', data})})).json();
        alert(res.message);
        if(res.success) location.reload();
    }
    init();
  </script>
</body>
</html>
