<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
    .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; z-index: 9999; }
    .toast.show { top: 24px; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <div id="customToast" class="toast flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md" role="alert">
    <div class="ml-3 text-sm font-medium" id="toastMessage"></div>
  </div>

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800 text-white font-bold tracking-wider">APJ INVENTORI</div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Input Stok</a>
      <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-emerald-600/10 text-emerald-500 rounded-lg font-medium text-sm transition-colors border border-emerald-500/20">Output Stok</a>
      <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Stok Opname</a>
      <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50">
      <h2 class="text-lg font-semibold text-emerald-400">Form Transaksi Output Stok</h2>
      <div class="text-sm font-medium text-slate-400">Petugas: <span id="namaPetugas" class="text-emerald-400">Memuat...</span></div>
    </header>

    <div class="p-8 max-w-[1400px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tanggal Keluar</label>
            <input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-emerald-500 focus:outline-none">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kategori Transaksi</label>
            <select id="kategoriSelect" onchange="handleKategoriChange()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-emerald-500 focus:outline-none">
              <option value="" disabled selected>-- Pilih Kategori --</option>
              </select>
          </div>
        </div>

        <div class="border border-slate-800 rounded-lg overflow-x-auto mb-6">
          <table class="w-full text-left border-collapse min-w-[1200px]">
            <thead id="tableHeader">
              <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
                <th class="p-4 text-center">Silakan Pilih Kategori Terlebih Dahulu</th>
              </tr>
            </thead>
            <tbody id="itemTableBody">
              <tr><td class="p-8 text-center text-slate-500 italic">Pilih kategori transaksi di atas untuk menampilkan struktur formulir.</td></tr>
            </tbody>
          </table>
          <div class="bg-slate-900 p-3 text-center border-t border-slate-800">
            <button type="button" id="btnTambahBaris" onclick="tambahBarisBaru()" class="text-emerald-500 hover:text-emerald-400 text-sm font-medium flex items-center justify-center gap-2 w-full" disabled>+ Tambah Baris Barang</button>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" id="btnSimpan" onclick="simpanData()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-8 py-3 rounded-lg text-sm font-semibold transition-colors shadow-lg">Simpan Transaksi</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let globalListBarang = [];
    let globalListUser = [];
    let globalListOutlet = [];
    let globalListProduksi = [];

    document.addEventListener('DOMContentLoaded', async () => {
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') { window.location.href = 'index.html'; return; }
      document.getElementById('namaPetugas').textContent = localStorage.getItem('APJ_USER_NAME');
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];
      
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');

      try {
        const resUser = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:'getUsers'}) })).json();
        if(resUser.success) globalListUser = resUser.data;
        
        const resOutlet = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:'getOutlets'}) })).json();
        if(resOutlet.success) globalListOutlet = resOutlet.data;
        
        const resProd = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:'getProduksiMaster'}) })).json();
        if(resProd.success) globalListProduksi = resProd.data;

        const resKat = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:'getKategori'}) })).json();
        if(resKat.success) {
          resKat.data.forEach(kat => {
            if (perms[kat.key] === 'Y') {
              const op = document.createElement('option');
              op.value = kat.sheet;
              op.textContent = kat.label;
              document.getElementById('kategoriSelect').appendChild(op);
            }
          });
        }
      } catch(e) { console.log("Gagal memuat komponen pendukung dropdown."); }
    });

    function showToast(msg, type = 'success') {
      const t = document.getElementById('customToast'); document.getElementById('toastMessage').textContent = msg;
      t.className = type === 'success' ? "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-emerald-950/90 border-emerald-800 text-emerald-400 backdrop-blur-md" : "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-rose-950/90 border-rose-800 text-rose-400 backdrop-blur-md";
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function handleKategoriChange() {
      const sh = document.getElementById('kategoriSelect').value; if(!sh) return;
      const th = document.getElementById('tableHeader');
      const tbody = document.getElementById('itemTableBody');
      
      tbody.innerHTML = '<tr><td colspan="12" class="p-8 text-center text-slate-500 italic">Sedang memuat struktur tabel...</td></tr>';
      document.getElementById('btnTambahBaris').disabled = true;

      // Jika yang dipilih adalah MASTER_BARANG_PRODUKSI (Milik kategori Produksi)
      if(sh === 'MASTER_BARANG_PRODUKSI') {
        th.innerHTML = `<tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
          <th class="p-3 w-2/12">Nama Produksi</th><th class="p-3 w-2/12">Bahan Mentah</th><th class="p-3 w-1/12 text-center">Qty Keluar</th>
          <th class="p-3 w-1/12 text-center">Satuan</th><th class="p-3 w-1/12 text-center">Qty Produksi</th><th class="p-3 w-1/12 text-center">Satuan</th><th class="p-3 w-1/12 text-center">Aksi</th>
        </tr>`;
        tbody.innerHTML = '';
        document.getElementById('btnTambahBaris').disabled = false;
        tambahBarisBaru();
      } else {
        // Tampilan Standard (Sesuai kolom OUTPUT: image_bfe99e.png)
        th.innerHTML = `<tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
          <th class="p-3 w-2/12">Nama Barang</th><th class="p-3 w-1/12 text-center">Stok Sisa</th><th class="p-3 w-1/12 text-center">Qty Keluar</th>
          <th class="p-3 w-1/12 text-center">Satuan</th><th class="p-3 w-2/12">Tujuan</th><th class="p-3 w-2/12">Outlet</th><th class="p-3 w-2/12">PIC</th>
          <th class="p-3 w-2/12">Keterangan</th><th class="p-3 w-1/12 text-center">Aksi</th>
        </tr>`;
        try {
          const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
          if(res.success) {
            globalListBarang = res.data;
            tbody.innerHTML = '';
            document.getElementById('btnTambahBaris').disabled = false;
            tambahBarisBaru();
          }
        } catch(e) { showToast("Koneksi gagal", "error"); }
      }
    }

    function tambahBarisBaru() {
      const sh = document.getElementById('kategoriSelect').value;
      const tbody = document.getElementById('itemTableBody');
      const tr = document.createElement('tr');
      tr.className = "border-b border-slate-800/50 bg-slate-950 item-row";

      if(sh === 'MASTER_BARANG_PRODUKSI') {
        const menuUnik = [...new Set(globalListProduksi.map(item => item.namaProduksi))];
        tr.innerHTML = `
          <td class="p-3"><select onchange="handleSelectProduksi(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white select-prod"><option value="">-- Pilih --</option>${menuUnik.map(m => `<option value="${m}">${m}</option>`).join('')}</select><input type="hidden" class="input-id-resep"></td>
          <td class="p-3"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white select-bahan-mentah" disabled><option value="">-- Bahan --</option></select></td>
          <td class="p-3"><input type="number" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-center text-sm text-white input-qty-keluar"></td>
          <td class="p-3 text-center text-sm text-slate-400 label-satuan-bahan">-</td>
          <td class="p-3"><input type="number" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-center text-sm text-white input-qty-prod"></td>
          <td class="p-3 text-center text-sm text-slate-400 label-satuan-prod">-</td>
          <td class="p-3 text-center"><button type="button" class="text-rose-500 text-sm font-medium" onclick="this.closest('tr').remove()">Hapus</button></td>
        `;
      } else {
        tr.innerHTML = `
          <td class="p-3"><select onchange="handleSelectBarangStandard(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white select-brg-std"><option value="">-- Pilih --</option>${globalListBarang.map(b => `<option value="${b.id}" data-stok="${b.stokTersedia}" data-satuan="${b.satuanStok}">${b.nama}</option>`).join('')}</select></td>
          <td class="p-3 text-center text-sm font-medium text-slate-400 label-stok-sistem">0</td>
          <td class="p-3"><input type="number" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-center text-sm text-white input-qty-keluar"></td>
          <td class="p-3 text-center text-sm text-slate-400 label-satuan-keluar">-</td>
          <td class="p-3"><select onchange="toggleTujuanFields(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white select-tujuan"><option value="Pakai">Pakai (Internal)</option><option value="Transfer">Transfer</option></select></td>
          <td class="p-3"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-slate-500 select-outlet" disabled><option value="">-</option>${globalListOutlet.map(o => `<option value="${o}">${o}</option>`).join('')}</select></td>
          <td class="p-3"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-slate-500 select-pic" disabled><option value="">-</option>${globalListUser.map(u => `<option value="${u}">${u}</option>`).join('')}</select></td>
          <td class="p-3"><input type="text" placeholder="Catatan..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white input-keterangan"></td>
          <td class="p-3 text-center"><button type="button" class="text-rose-500 text-sm font-medium" onclick="this.closest('tr').remove()">Hapus</button></td>
        `;
      }
      tbody.appendChild(tr);
    }

    function handleSelectProduksi(sel) {
      const val = sel.value;
      const tr = sel.closest('tr');
      const idResepInput = tr.querySelector('.input-id-resep');
      const bahanSel = tr.querySelector('.select-bahan-mentah');
      const lblSatBahan = tr.querySelector('.label-satuan-bahan');
      const lblSatProd = tr.querySelector('.label-satuan-prod');
      
      if(!val) { bahanSel.innerHTML = '<option value="">-- Bahan --</option>'; bahanSel.disabled = true; return; }
      
      const filtered = globalListProduksi.filter(item => item.namaProduksi === val);
      bahanSel.innerHTML = filtered.map(item => `<option value="${item.bahanMentah}" data-idresep="${item.idResep}" data-satbahan="${item.satuanBahan}" data-satprod="${item.satuanProduksi}">${item.bahanMentah}</option>`).join('');
      bahanSel.disabled = false;
      
      if(filtered.length > 0) {
        idResepInput.value = filtered[0].idResep;
        lblSatBahan.innerText = filtered[0].satuanBahan;
        lblSatProd.innerText = filtered[0].satuanProduksi;
      }
      
      bahanSel.onchange = () => {
        const opt = bahanSel.options[bahanSel.selectedIndex];
        idResepInput.value = opt.getAttribute('data-idresep') || '';
        lblSatBahan.innerText = opt.getAttribute('data-satbahan') || '-';
        lblSatProd.innerText = opt.getAttribute('data-satprod') || '-';
      };
    }

    function handleSelectBarangStandard(sel) {
      const opt = sel.options[sel.selectedIndex];
      const tr = sel.closest('tr');
      tr.querySelector('.label-stok-sistem').innerText = opt.getAttribute('data-stok') || '0';
      tr.querySelector('.label-satuan-keluar').innerText = opt.getAttribute('data-satuan') || '-';
    }

    function toggleTujuanFields(sel) {
      const tr = sel.closest('tr');
      const outSel = tr.querySelector('.select-outlet');
      const picSel = tr.querySelector('.select-pic');
      
      if(sel.value === 'Transfer') {
        outSel.disabled = false; picSel.disabled = false;
        outSel.className = "w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white select-outlet";
        picSel.className = "w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-white select-pic";
      } else {
        outSel.disabled = true; picSel.disabled = true; outSel.value = ""; picSel.value = "";
        outSel.className = "w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-slate-500 select-outlet";
        picSel.className = "w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm text-slate-500 select-pic";
      }
    }

    async function simpanData() {
      const sh = document.getElementById('kategoriSelect').value;
      if(!sh) return showToast("Pilih kategori terlebih dahulu!", "error");
      
      let data = [];
      let targetSheet = "OUTPUT"; // Default sheet umum
      
      if(sh === 'MASTER_BARANG_PRODUKSI') {
        targetSheet = "OUTPUT_PRODUKSI"; // Sheet untuk olahan
        document.querySelectorAll('.item-row').forEach(r => {
          let idResep = r.querySelector('.input-id-resep').value;
          let pName = r.querySelector('.select-prod').value;
          let bName = r.querySelector('.select-bahan-mentah').value;
          let qKeluar = r.querySelector('.input-qty-keluar').value;
          let qProd = r.querySelector('.input-qty-prod').value;
          
          if(pName && bName && qKeluar) {
            // Push berurutan sesuai kolom Sheet OUTPUT_PRODUKSI (A-I): 
            // ID Trans, Tgl, Petugas, ID Barang, Nama Barang, Qty Keluar, Sat Stok, Qty Prod, Sat Prod
            data.push([
              document.getElementById('tanggalInput').value,
              localStorage.getItem('APJ_USER_NAME'),
              idResep,
              pName + " (" + bName + ")", // Menggabungkan Nama Produksi dan Bahan agar jelas
              qKeluar,
              r.querySelector('.label-satuan-bahan').innerText,
              qProd || "0",
              r.querySelector('.label-satuan-prod').innerText
            ]);
          }
        });
      } else {
        document.querySelectorAll('.item-row').forEach(r => {
          let sBrg = r.querySelector('.select-brg-std');
          let qKeluar = r.querySelector('.input-qty-keluar').value;
          let tujuan = r.querySelector('.select-tujuan').value;
          let keterangan = r.querySelector('.input-keterangan').value;
          
          if(sBrg.value && qKeluar) {
             // Push berurutan sesuai kolom Sheet OUTPUT (A-L):
             // ID Trans, Tgl, Petugas, Kategori, ID Brg, Nama Brg, Qty Keluar, Sat Stok, Tujuan, Outlet, PIC, Keterangan
            data.push([
              document.getElementById('tanggalInput').value,
              localStorage.getItem('APJ_USER_NAME'),
              document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text,
              sBrg.value,
              sBrg.options[sBrg.selectedIndex].text,
              qKeluar,
              r.querySelector('.label-satuan-keluar').innerText,
              tujuan,
              r.querySelector('.select-outlet').value || "-",
              r.querySelector('.select-pic').value || "-",
              keterangan || "-"
            ]);
          }
        });
      }

      if(!data.length) return showToast("Mohon isi data baris dengan lengkap!", "error");

      const btn = document.getElementById('btnSimpan');
      btn.disabled = true; btn.innerText = "Menyimpan...";

      try {
        const res = await (await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'simpanTransaksi', sheetName: targetSheet, data: data })
        })).json();

        if(res.success) {
          showToast(res.message);
          setTimeout(() => location.reload(), 2000);
        } else {
          showToast(res.message, "error");
          btn.disabled = false; btn.innerText = "Simpan Transaksi";
        }
      } catch(e) {
        showToast("Koneksi bermasalah.", "error");
        btn.disabled = false; btn.innerText = "Simpan Transaksi";
      }
    }
  </script>
</body>
</html>
