<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; } .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; z-index: 9999; } .toast.show { top: 24px; } input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; } 

    /* ================= APJ INVENTORI v15 UI PRO ================= */
    :root {
      --apj-blue: #3b82f6;
      --apj-sky: #38bdf8;
      --apj-emerald: #34d399;
      --apj-amber: #f59e0b;
      --apj-rose: #fb7185;
      --apj-violet: #a78bfa;
      --apj-bg: #0f172a;
      --apj-card: rgba(15, 23, 42, .86);
    }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 0% 0%, rgba(59,130,246,.18), transparent 28%),
        radial-gradient(circle at 100% 0%, rgba(167,139,250,.14), transparent 24%),
        radial-gradient(circle at 80% 100%, rgba(52,211,153,.10), transparent 30%),
        #0f172a !important;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.72), transparent 72%);
    }
    aside, main, #customToast, .apj-help-fab, .apj-mobile-menu, .apj-sidebar-backdrop, .apj-guide-modal { position: relative; z-index: 1; }
    aside {
      background: linear-gradient(180deg, rgba(2,6,23,.98), rgba(15,23,42,.96)) !important;
      border-right-color: rgba(51,65,85,.85) !important;
      box-shadow: 18px 0 50px rgba(0,0,0,.18);
    }
    aside nav a {
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
    }
    aside nav a::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(255,255,255,.08), transparent 45%);
      opacity: 0;
      transform: translateX(-30%);
      transition: opacity .25s ease, transform .25s ease;
    }
    aside nav a:hover::after { opacity: 1; transform: translateX(0); }
    .apj-nav-ico {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      border-radius: 10px;
      background: rgba(15,23,42,.85);
      border: 1px solid rgba(148,163,184,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .apj-active-link {
      background: linear-gradient(135deg, rgba(59,130,246,.18), rgba(14,165,233,.08)) !important;
      border-color: rgba(59,130,246,.35) !important;
      color: #fff !important;
      box-shadow: 0 14px 35px rgba(37,99,235,.12);
    }
    .apj-card-glow, .bg-slate-950, .bg-slate-900\/80 {
      box-shadow: 0 22px 70px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .apj-lift, .bg-slate-950.border, .bg-slate-900.border {
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
    }
    .apj-lift:hover, .bg-slate-950.border:hover {
      transform: translateY(-2px);
      border-color: rgba(96,165,250,.35) !important;
      box-shadow: 0 24px 70px rgba(15,23,42,.38), 0 0 0 1px rgba(96,165,250,.06) inset;
    }
    .apj-soft-animate { animation: apjSoftEnter .45s ease-out both; }
    @keyframes apjSoftEnter { from { opacity: 0; transform: translateY(12px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes apjPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,.35); } 50% { box-shadow: 0 0 0 10px rgba(59,130,246,0); } }
    .apj-help-fab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 60;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(96,165,250,.35);
      background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(14,165,233,.9));
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 22px 60px rgba(37,99,235,.32);
      transition: transform .2s ease, filter .2s ease;
      animation: apjPulse 2.2s ease-in-out infinite;
    }
    .apj-help-fab:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.08); }
    .apj-guide-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .apj-guide-modal.show { display: flex; }
    .apj-guide-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(2,6,23,.82);
      backdrop-filter: blur(10px);
    }
    .apj-guide-card {
      position: relative;
      width: min(760px, 100%);
      max-height: 90dvh;
      overflow: auto;
      border-radius: 24px;
      border: 1px solid rgba(148,163,184,.22);
      background: linear-gradient(180deg, rgba(15,23,42,.98), rgba(2,6,23,.98));
      box-shadow: 0 30px 120px rgba(0,0,0,.55);
      padding: 22px;
      transform: translateY(10px) scale(.98);
      opacity: 0;
      transition: transform .24s ease, opacity .24s ease;
    }
    .apj-guide-modal.show .apj-guide-card { transform: translateY(0) scale(1); opacity: 1; }
    .apj-guide-title {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 16px;
    }
    .apj-guide-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 25px;
      background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(14,165,233,.10));
      border: 1px solid rgba(96,165,250,.28);
    }
    .apj-guide-steps { display: grid; gap: 10px; margin: 16px 0; }
    .apj-guide-step {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(15,23,42,.78);
      border: 1px solid rgba(71,85,105,.55);
    }
    .apj-step-no {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
      color: white;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }
    .apj-guide-note {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(245,158,11,.28);
      background: rgba(120,53,15,.20);
      color: #fde68a;
      font-size: 13px;
      line-height: 1.6;
    }
    .apj-guide-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }
    .apj-btn-soft {
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.25);
      background: rgba(15,23,42,.9);
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
    }
    .apj-btn-primary {
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      color: white;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 14px 40px rgba(37,99,235,.22);
    }
    .apj-mobile-menu {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 70;
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.28);
      background: rgba(2,6,23,.88);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .apj-sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 65;
      display: none;
      background: rgba(2,6,23,.68);
      backdrop-filter: blur(7px);
    }
    .apj-sidebar-backdrop.show { display: block; }
    @media (max-width: 1023px) {
      body { min-height: 100dvh; }
      .apj-mobile-menu { display: inline-flex; }
      aside {
        position: fixed !important;
        inset: 0 auto 0 0 !important;
        width: min(290px, 86vw) !important;
        z-index: 80 !important;
        transform: translateX(-105%);
        transition: transform .28s ease !important;
      }
      aside.apj-open { transform: translateX(0) !important; }
      main header { padding-left: 68px !important; }
      input, select, textarea { font-size: 16px !important; }
      .apj-help-fab { right: 14px; bottom: 14px; padding: 11px 13px; }
      .apj-help-fab span:last-child { display: none; }
    }
    @media print {
      .apj-help-fab, .apj-guide-modal, .apj-mobile-menu, .apj-sidebar-backdrop { display: none !important; }
      body::before { display: none !important; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }
    /* ================= /APJ INVENTORI v15 UI PRO ================= */

  </style>
</head>
<body data-apj-page="output-stok.html" class="flex h-screen overflow-hidden antialiased">

  <div id="customToast" class="toast flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md" role="alert"><div class="ml-3 text-sm font-medium" id="toastMessage"></div></div>

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800"><div class="flex items-center gap-3 text-blue-500"><span class="text-sm font-bold tracking-wider text-white">APJ INVENTORI</span></div></div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Input Stok</a>
      <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-rose-600/10 text-rose-500 rounded-lg font-medium text-sm transition-colors border border-rose-500/20">Output Stok</a>
      <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Stok Opname</a>
      <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
      <h2 class="text-lg font-semibold text-rose-400">Form Output Stok (Pemakaian)</h2>
      <div class="text-sm font-medium text-slate-400">Petugas: <span id="namaPetugas" class="text-rose-400">Memuat...</span></div>
    </header>

    <div class="p-8 max-w-[1400px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div><label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tanggal Keluar</label><input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-rose-500 focus:outline-none"></div>
          <div><label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kategori Transaksi</label><select id="kategoriSelect" onchange="handleKategoriChange()" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-white focus:border-rose-500 focus:outline-none"><option value="" disabled selected>-- Pilih Kategori --</option></select></div>
        </div>

        <div class="border border-slate-800 rounded-lg overflow-x-auto mb-6">
          <table class="w-full text-left border-collapse min-w-[900px]">
            <thead>
              <tr class="bg-slate-900 border-b border-slate-800 text-xs uppercase tracking-wider text-slate-400">
                <th class="p-4 w-4/12">Nama Barang</th>
                <th class="p-4 w-1/12 text-center">Stok Tersedia</th>
                <th class="p-4 w-1/12 text-center">Satuan</th>
                <th class="p-4 w-2/12 text-center">Qty Keluar</th>
                <th class="p-4 w-1/12 text-center">Satuan</th>
                <th class="p-4 w-2/12">Keterangan / Tujuan</th>
                <th class="p-4 w-1/12 text-center">Aksi</th>
              </tr>
            </thead>
            <tbody id="itemTableBody">
              <tr class="border-b border-slate-800/50 bg-slate-950 item-row">
                <td class="p-3"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang" disabled><option value="">Pilih kategori terlebih dahulu...</option></select></td>
                <td class="p-3 text-center text-sm font-bold text-emerald-400 label-stok-tersedia">-</td>
                <td class="p-3 text-center text-sm font-bold text-slate-500 label-sat-1">-</td>
                <td class="p-3"><input type="number" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white text-center input-qty" placeholder="0" disabled></td>
                <td class="p-3 text-center text-sm font-bold text-rose-400 label-sat-2">-</td>
                <td class="p-3"><input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-ket" placeholder="Keterangan..." disabled></td>
                <td class="p-3 text-center"><button type="button" class="text-slate-600 text-sm font-medium" disabled>Hapus</button></td>
              </tr>
            </tbody>
          </table>
          <div class="bg-slate-900 p-3 text-center border-t border-slate-800">
            <button type="button" id="btnTambahBaris" onclick="tambahBarisBaru()" class="text-rose-500 hover:text-rose-400 text-sm font-medium flex items-center justify-center gap-2 w-full" disabled>+ Tambah Baris Barang</button>
          </div>
        </div>

        <div class="flex justify-end">
          <button type="button" id="btnSimpan" class="bg-rose-600 hover:bg-rose-700 text-white px-8 py-3 rounded-lg text-sm font-semibold transition-colors shadow-lg shadow-rose-600/20">Simpan Output Stok</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let globalListBarang = [];

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') { window.location.href = 'index.html'; return; }
      document.getElementById('namaPetugas').textContent = localStorage.getItem('APJ_USER_NAME');
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(kat => { if (perms[kat.key] === 'Y') { const op = document.createElement('option'); op.value = kat.sheet; op.textContent = kat.label; document.getElementById('kategoriSelect').appendChild(op); }});
    });

    function showToast(message, type = 'success') {
      const toast = document.getElementById('customToast');
      document.getElementById('toastMessage').textContent = message;
      toast.className = type === 'success' ? "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-emerald-950/90 border-emerald-800 text-emerald-400 backdrop-blur-md" : "toast show flex items-center w-full max-w-md p-4 rounded-lg shadow-xl border bg-rose-950/90 border-rose-800 text-rose-400 backdrop-blur-md";
      setTimeout(() => toast.classList.remove('show'), 4000);
    }

    async function handleKategoriChange() {
      const selectedSheet = document.getElementById('kategoriSelect').value;
      if (!selectedSheet) return;

      const tbody = document.getElementById('itemTableBody');
      tbody.innerHTML = `<tr class="border-b border-slate-800/50 bg-slate-950 item-row"><td class="p-3"><select class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang" disabled><option>Memuat data...</option></select></td><td class="p-3 text-center text-emerald-400">-</td><td class="p-3 text-center text-slate-500">-</td><td class="p-3"><input type="number" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white text-center" disabled></td><td class="p-3 text-center text-rose-400">-</td><td class="p-3"><input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white" disabled></td><td class="p-3 text-center">-</td></tr>`;
      document.getElementById('btnTambahBaris').disabled = true;

      try {
        const response = await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, redirect: 'follow', body: JSON.stringify({ action: 'getBarang', sheetName: selectedSheet }) });
        const result = await response.json();
        if (result.success) {
          globalListBarang = result.data;
          tbody.innerHTML = ''; document.getElementById('btnTambahBaris').disabled = false;
          tambahBarisBaru();
        } else showToast(result.message, "error");
      } catch (error) { showToast("Koneksi gagal.", "error"); }
    }

// --- REVISI DI BAGIAN INI ---
    function tambahBarisBaru() {
      const tbody = document.getElementById('itemTableBody');
      const tr = document.createElement('tr');
      tr.className = "border-b border-slate-800/50 bg-slate-950 item-row";
      
      // Menambahkan atribut data-stok="${b.stokTersedia}" pada option
      const optionsHtml = globalListBarang.map(b => 
        `<option value="${b.id}" data-sat="${b.satuanStok}" data-stok="${b.stokTersedia}">[${b.id}] ${b.nama}</option>`
      ).join('');

      tr.innerHTML = `
        <td class="p-3"><select onchange="upd(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang"><option value="">-- Pilih Barang --</option>${optionsHtml}</select></td>
        <td class="p-3 text-center text-sm font-bold text-emerald-400 label-stok-tersedia">0</td>
        <td class="p-3 text-center text-sm font-bold text-slate-500 label-sat-1">-</td>
        <td class="p-3"><input type="number" step="any" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white text-center input-qty" placeholder="0"></td>
        <td class="p-3 text-center text-sm font-bold text-rose-400 label-sat-2">-</td>
        <td class="p-3"><input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-ket" placeholder="Keterangan..."></td>
        <td class="p-3 text-center"><button type="button" class="text-slate-600 hover:text-rose-500 text-sm font-medium" onclick="this.closest('tr').remove()">Hapus</button></td>
      `;
      tbody.appendChild(tr);
    }

// --- REVISI DI BAGIAN INI ---
    function upd(sel) { 
      const selectedOpt = sel.options[sel.selectedIndex];
      const sat = selectedOpt.getAttribute('data-sat') || '-';
      const stok = selectedOpt.getAttribute('data-stok') || '0';
      
      const row = sel.closest('tr');
      row.querySelector('.label-sat-1').innerText = sat;
      row.querySelector('.label-sat-2').innerText = sat;
      row.querySelector('.label-stok-tersedia').innerText = stok; // Angka muncul di sini
    }

    document.getElementById('btnSimpan').addEventListener('click', async () => {
      let data = [];
      document.querySelectorAll('.item-row').forEach(r => {
        let sel = r.querySelector('.select-barang'), q = r.querySelector('.input-qty').value, k = r.querySelector('.input-ket').value;
        if(sel.value && q > 0) data.push([document.getElementById('tanggalInput').value, localStorage.getItem('APJ_USER_NAME'), document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text, sel.value, sel.options[sel.selectedIndex].text.split('] ')[1], q, r.querySelector('.label-sat-2').innerText, k]);
      });
      if(!data.length) return showToast("Isi data dengan benar!", "error");
      const btn = document.getElementById('btnSimpan'); btn.disabled = true; btn.innerText = "Menyimpan...";
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'simpanTransaksi', sheetName: 'TRANSAKSI_OUTPUT_STOK', data }) })).json();
      if(res.success) { showToast(res.message); setTimeout(()=>location.reload(), 2000); } else { showToast(res.message, "error"); btn.disabled = false; btn.innerText = "Simpan Output Stok"; }
    });
  </script>

<script>
(function APJ_UI_PRO_BOOT(){
  const page = (document.body.getAttribute('data-apj-page') || (location.pathname.split('/').pop() || '')).toLowerCase();
  const icons = {
    'dashboard.html':'🏠',
    'input-stok.html':'📥',
    'output-stok.html':'📤',
    'transfer-produksi.html':'🚚',
    'produk-outlet.html':'🏪',

  function ready(fn){ if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn); else fn(); }
  function fileNameFromHref(href){ try { return (href || '').split('/').pop().split('?')[0].split('#')[0].toLowerCase(); } catch(e){ return ''; } }
  function currentFile(){ return page || fileNameFromHref(location.href); }
  function safe(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function renderSidebar(){
    const nav = document.querySelector('aside nav');
    if (!nav) return;
    const active = currentFile();
    const menu = [
      ['dashboard.html','Dashboard'], ['input-stok.html','Input Stok'], ['output-stok.html','Output Stok'],
      ['transfer-produksi.html','Transfer Produk Outlet'], ['produk-outlet.html','Produk Outlet'],
      ['stok-opname.html','Stok Opname'], ['lihat-stok.html','Lihat Stok'], ['riwayat-transaksi.html','Riwayat Transaksi']
    ];
    nav.innerHTML = '<p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>' + menu.map(([href,label]) => {
      const isActive = active === href;
      const cls = isActive ? 'apj-active-link flex items-center gap-3 px-3 py-2.5 rounded-lg font-semibold text-sm transition-colors' : 'flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors';
      return `<a href="${href}" class="${cls}"><span class="apj-nav-ico">${icons[href] || '•'}</span><span>${label}</span></a>`;
    }).join('');
  }

  function ensureLogout(){
    const aside = document.querySelector('aside');
    if (!aside) return;
    if (aside.textContent.toLowerCase().includes('logout sistem')) return;
    const wrap = document.createElement('div');
    wrap.className = 'p-4 border-t border-slate-800';
    wrap.innerHTML = '<button type="button" onclick="APJUI_logout()" class="flex items-center gap-3 w-full px-3 py-2.5 text-rose-400 hover:text-rose-300 hover:bg-rose-950/50 rounded-lg font-medium text-sm transition-colors border border-transparent hover:border-rose-900/50"><span class="apj-nav-ico">🚪</span><span>Logout Sistem</span></button>';
    aside.appendChild(wrap);
  }

  window.APJUI_logout = function(){
    ['APJ_SESSION_ACTIVE','APJ_USER_NAME','APJ_USER_LEVEL','APJ_USER_PERMISSIONS'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  };

  function setupMobileSidebar(){
    const aside = document.querySelector('aside');
    if (!aside || document.querySelector('.apj-mobile-menu') || document.getElementById('mobileMenuBtn')) return;
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'apj-mobile-menu';
    btn.setAttribute('aria-label','Buka menu');
    btn.innerHTML = '☰';
    const backdrop = document.createElement('div');
    backdrop.className = 'apj-sidebar-backdrop';
    document.body.appendChild(btn);
    document.body.appendChild(backdrop);
    function close(){ aside.classList.remove('apj-open'); backdrop.classList.remove('show'); }
    function open(){ aside.classList.add('apj-open'); backdrop.classList.add('show'); }
    btn.addEventListener('click', open);
    backdrop.addEventListener('click', close);
    aside.addEventListener('click', (e) => { if (e.target.closest('a') && window.innerWidth < 1024) close(); });
  }

  function guideData(){ return guide[currentFile()] || null; }
  function buildGuideModal(){
    const data = guideData();
    if (!data || document.getElementById('apjGuideModal')) return;
    const modal = document.createElement('div');
    modal.id = 'apjGuideModal';
    modal.className = 'apj-guide-modal';
    modal.innerHTML = `
      <div class="apj-guide-backdrop" onclick="APJUI_closeGuide()"></div>
      <div class="apj-guide-card" role="dialog" aria-modal="true" aria-labelledby="apjGuideTitle">
        <div class="apj-guide-title">
          <div class="apj-guide-icon">${data.icon}</div>
          <div class="min-w-0">
            <p class="text-[11px] font-black uppercase tracking-[.18em] text-blue-300 mb-1">Bantuan Cepat APJ</p>
            <h3 id="apjGuideTitle" class="text-xl sm:text-2xl font-extrabold text-white">${safe(data.title)}</h3>
            <p class="text-sm text-slate-400 mt-1 leading-relaxed">${safe(data.subtitle)}</p>
          </div>
        </div>
        <div class="apj-guide-steps">
          ${data.steps.map((step, idx) => `<div class="apj-guide-step"><span class="apj-step-no">${idx+1}</span><p class="text-sm text-slate-200 leading-relaxed">${safe(step)}</p></div>`).join('')}
        </div>
        <div class="apj-guide-note"><b>Catatan:</b> ${safe(data.note)}</div>
        <div class="apj-guide-actions">
          <button type="button" class="apj-btn-soft" onclick="APJUI_resetGuideAuto()">Tampilkan otomatis lagi</button>
          <button type="button" class="apj-btn-primary" onclick="APJUI_closeGuide()">Paham, lanjut kerja</button>
        </div>
      </div>`;
    const fab = document.createElement('button');
    fab.type = 'button';
    fab.className = 'apj-help-fab';
    fab.innerHTML = `<span>${data.icon}</span><span>Panduan</span>`;
    fab.addEventListener('click', () => window.APJUI_openGuide(false));
    document.body.appendChild(modal);
    document.body.appendChild(fab);
  }

  window.APJUI_openGuide = function(auto){
    const modal = document.getElementById('apjGuideModal');
    if (!modal) return;
    modal.classList.add('show');
    if (auto) localStorage.setItem('APJ_HELP_SEEN_' + currentFile(), 'Y');
  };
  window.APJUI_closeGuide = function(){
    const modal = document.getElementById('apjGuideModal');
    if (modal) modal.classList.remove('show');
  };
  window.APJUI_resetGuideAuto = function(){
    localStorage.removeItem('APJ_HELP_SEEN_' + currentFile());
    window.APJUI_closeGuide();
    setTimeout(() => window.APJUI_openGuide(true), 150);
  };

  function enhanceCards(){
    document.querySelectorAll('.bg-slate-950.border, .bg-slate-900.border').forEach(el => el.classList.add('apj-lift'));
    document.querySelectorAll('main > div, main > section').forEach(el => el.classList.add('apj-soft-animate'));
  }

  ready(function(){
    renderSidebar();
    ensureLogout();
    setupMobileSidebar();
    buildGuideModal();
    enhanceCards();
    const data = guideData();
    if (data && !localStorage.getItem('APJ_HELP_SEEN_' + currentFile())) {
      setTimeout(() => window.APJUI_openGuide(true), 650);
    }
  });
})();
</script>
