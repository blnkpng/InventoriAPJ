<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Stok | APJ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style> body { background-color: #0f172a; color: #f8fafc; } .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; z-index: 9999; } .toast.show { top: 24px; } input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; } </style>
</head>
<body class="p-8 antialiased">
  <div id="customToast" class="toast flex items-center max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md bg-emerald-950 text-emerald-400"><div id="toastMessage"></div></div>
  
  <div class="max-w-6xl mx-auto bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
    <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
      <h2 class="text-xl font-bold text-rose-400">Form Output Stok (Pemakaian)</h2>
      <a href="dashboard.html" class="text-sm text-slate-400 hover:text-white">← Kembali ke Dashboard</a>
    </div>

    <div class="grid grid-cols-2 gap-6 mb-6">
      <div><label class="text-xs text-slate-400 block mb-2">Tanggal Keluar</label><input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm"></div>
      <div><label class="text-xs text-slate-400 block mb-2">Kategori Transaksi</label><select id="kategoriSelect" onchange="handleKategori()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm"><option value="" selected>-- Pilih Kategori --</option></select></div>
    </div>

    <table class="w-full text-left border-collapse mb-4"><thead class="bg-slate-900 text-xs text-slate-400 border-b border-slate-800">
      <tr><th class="p-3 w-4/12">Barang</th><th class="p-3 w-2/12 text-center">Qty Keluar</th><th class="p-3 w-1/12 text-center">Satuan</th><th class="p-3 w-4/12">Keterangan</th><th class="p-3 w-1/12 text-center">Aksi</th></tr>
    </thead><tbody id="tbodyData"></tbody></table>
    <button onclick="tambahBaris()" class="text-blue-500 text-sm font-medium w-full text-center p-3 border-t border-slate-800 bg-slate-900">+ Tambah Baris</button>
    <div class="mt-6 flex justify-end"><button id="btnSimpan" class="bg-rose-600 hover:bg-rose-700 px-6 py-2.5 rounded-lg text-sm font-semibold text-white">Simpan Output Stok</button></div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let listBarang = [];
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(k => { if(perms[k.key] === 'Y') document.getElementById('kategoriSelect').innerHTML += `<option value="${k.sheet}">${k.label}</option>`; });
      tambahBaris();
    });

    async function handleKategori() {
      const sh = document.getElementById('kategoriSelect').value; if(!sh) return;
      document.getElementById('tbodyData').innerHTML = ''; tambahBaris(); document.querySelector('.select-barang').innerHTML = `<option>Loading...</option>`;
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
      listBarang = res.data; populate(document.querySelector('.select-barang'));
    }

    function tambahBaris() {
      const tr = document.createElement('tr'); tr.className = "border-b border-slate-800 item-row";
      tr.innerHTML = `<td class="p-2"><select onchange="updSat(this)" class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm select-barang"></select></td><td class="p-2"><input type="number" class="w-full bg-slate-900 border border-slate-700 text-center rounded p-2 text-sm input-qty"></td><td class="p-2 text-center label-sat text-sm text-blue-400">-</td><td class="p-2"><input type="text" placeholder="Tujuan pakai..." class="w-full bg-slate-900 border border-slate-700 rounded p-2 text-sm input-ket"></td><td class="p-2 text-center"><button onclick="this.closest('tr').remove()" class="text-rose-500 text-sm">Hapus</button></td>`;
      document.getElementById('tbodyData').appendChild(tr); if(listBarang.length) populate(tr.querySelector('.select-barang'));
    }

    function populate(sel) { sel.innerHTML = '<option value="" disabled selected>-- Pilih --</option>'; listBarang.forEach(b => sel.innerHTML += `<option value="${b.id}" data-sat="${b.satuanStok}">[${b.id}] ${b.nama}</option>`); }
    function updSat(sel) { sel.closest('tr').querySelector('.label-sat').innerText = sel.options[sel.selectedIndex].getAttribute('data-sat') || '-'; }

    document.getElementById('btnSimpan').addEventListener('click', async () => {
      let data = [], err = false;
      document.querySelectorAll('.item-row').forEach(r => {
        let sel = r.querySelector('.select-barang'), q = r.querySelector('.input-qty').value, k = r.querySelector('.input-ket').value;
        if(sel.value && q > 0) data.push([document.getElementById('tanggalInput').value, localStorage.getItem('APJ_USER_NAME'), document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text, sel.value, sel.options[sel.selectedIndex].text.split('] ')[1], q, r.querySelector('.label-sat').innerText, k]);
        else if(sel.value) err = true;
      });
      if(!data.length || err) return alert("Cek kembali data barang dan qty!");
      document.getElementById('btnSimpan').innerText = "Menyimpan...";
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'simpanTransaksi', sheetName:'TRANSAKSI_OUTPUT_STOK', data})})).json();
      if(res.success) { alert(res.message); location.reload(); }
    });
  </script>
</body>
</html>
