<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Stok | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; } .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); transition: all 0.4s ease; z-index: 9999; } .toast.show { top: 24px; } input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; } </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <div id="customToast" class="toast flex items-center max-w-md p-4 rounded-lg shadow-xl border backdrop-blur-md bg-emerald-950 text-emerald-400"><div id="toastMessage"></div></div>

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800"><span class="text-sm font-bold tracking-wider text-white">APJ INVENTORI</span></div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg text-sm">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg text-sm">Input Stok</a>
      <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 bg-rose-600/10 text-rose-500 rounded-lg text-sm border border-rose-500/20">Output Stok</a>
      <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg text-sm">Stok Opname</a>
      <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg text-sm">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-y-auto">
<header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
  <h2 class="text-lg font-semibold text-rose-400">Form Output Stok (Pemakaian)</h2>
  <div class="text-sm font-medium text-slate-400">
    Petugas: <span id="namaPetugas" class="text-rose-400">Memuat...</span>
  </div>
</header>

    <div class="p-8 max-w-[1200px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Tanggal Keluar</label><input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:border-rose-500 focus:outline-none"></div>
          <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Kategori Transaksi</label><select id="kategoriSelect" onchange="handleKategori()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:border-rose-500 focus:outline-none"><option value="" selected>-- Pilih Kategori --</option></select></div>
        </div>

        <div class="border border-slate-800 rounded-lg overflow-x-auto mb-6">
          <table class="w-full text-left border-collapse min-w-[800px]">
            <thead class="bg-slate-900 text-xs text-slate-400 border-b border-slate-800 uppercase tracking-wider">
              <tr><th class="p-4 w-4/12">Nama Barang</th><th class="p-4 w-2/12 text-center">Qty Keluar</th><th class="p-4 w-1/12 text-center">Satuan</th><th class="p-4 w-4/12">Keterangan</th><th class="p-4 w-1/12 text-center">Aksi</th></tr>
            </thead>
            <tbody id="tbodyData">
              <tr class="border-b border-slate-800/50 bg-slate-950">
                <td class="p-4 text-center text-slate-600 italic" colspan="5">Pilih kategori di atas untuk memulai transaksi...</td>
              </tr>
            </tbody>
          </table>
          <button onclick="tambahBaris()" id="btnTambahBaris" class="text-rose-500 text-sm font-medium w-full text-center p-3 border-t border-slate-800 bg-slate-900 hover:bg-slate-800" disabled>+ Tambah Baris Barang</button>
        </div>
        <div class="flex justify-end"><button id="btnSimpan" class="bg-rose-600 hover:bg-rose-700 text-white px-8 py-3 rounded-lg text-sm font-semibold shadow-lg shadow-rose-600/20">Simpan Output Stok</button></div>
      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let listBarang = [];

    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') { window.location.href = 'index.html'; return; }
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(k => { if(perms[k.key] === 'Y') document.getElementById('kategoriSelect').innerHTML += `<option value="${k.sheet}">${k.label}</option>`; });
    });

    async function handleKategori() {
      const sh = document.getElementById('kategoriSelect').value; if(!sh) return;
      document.getElementById('tbodyData').innerHTML = '<tr><td colspan="5" class="p-4 text-center text-slate-400 italic">Memuat data...</td></tr>';
      
      try {
        const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
        if(res.success) {
          listBarang = res.data;
          document.getElementById('tbodyData').innerHTML = ''; 
          document.getElementById('btnTambahBaris').disabled = false;
          tambahBaris(); // Langsung munculkan 1 baris input aktif
        } else { alert(res.message); }
      } catch(e) { alert("Gagal mengambil data"); }
    }

    function tambahBaris() {
      const tbody = document.getElementById('tbodyData');
      const tr = document.createElement('tr');
      tr.className = "border-b border-slate-800 item-row bg-slate-950";
      tr.innerHTML = `<td class="p-3"><select onchange="updSat(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang">${listBarang.map(b => `<option value="${b.id}" data-sat="${b.satuanStok}">[${b.id}] ${b.nama}</option>`).join('')}</select></td><td class="p-3"><input type="number" step="any" class="w-full bg-slate-900 border border-slate-700 text-center rounded-lg p-2.5 text-sm text-white input-qty"></td><td class="p-3 text-center label-sat text-sm font-bold text-rose-400">-</td><td class="p-3"><input type="text" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-ket"></td><td class="p-3 text-center"><button onclick="this.closest('tr').remove()" class="text-slate-600 hover:text-rose-500 text-sm">Hapus</button></td>`;
      tbody.appendChild(tr);
    }

    function updSat(sel) { sel.closest('tr').querySelector('.label-sat').innerText = sel.options[sel.selectedIndex].getAttribute('data-sat') || '-'; }

    document.getElementById('btnSimpan').addEventListener('click', async () => {
      let data = [], err = false;
      document.querySelectorAll('.item-row').forEach(r => {
        let sel = r.querySelector('.select-barang'), q = r.querySelector('.input-qty').value, k = r.querySelector('.input-ket').value;
        if(sel.value && q > 0) data.push([document.getElementById('tanggalInput').value, localStorage.getItem('APJ_USER_NAME'), document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text, sel.value, sel.options[sel.selectedIndex].text.split('] ')[1], q, r.querySelector('.label-sat').innerText, k]);
      });
      if(!data.length) return alert("Barang belum dipilih atau qty 0!");
      const btn = document.getElementById('btnSimpan'); btn.innerText = "Menyimpan..."; btn.disabled = true;
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'simpanTransaksi', sheetName:'TRANSAKSI_OUTPUT_STOK', data})})).json();
      if(res.success) { alert("Berhasil!"); location.reload(); } else { alert(res.message); btn.disabled = false; btn.innerText = "Simpan Output Stok"; }
    });
  </script>
</body>
</html>
