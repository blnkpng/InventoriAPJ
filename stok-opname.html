<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stok Opname | APJ Inventori</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style> body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; } input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; } </style>
</head>
<body class="flex h-screen overflow-hidden antialiased">

  <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col flex-shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
      <div class="flex items-center gap-3 text-blue-500"><span class="text-sm font-bold tracking-wider text-white">APJ INVENTORI</span></div>
    </div>
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
      <p class="px-3 text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Dashboard</a>
      <a href="input-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Input Stok</a>
      <a href="output-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Output Stok</a>
      <a href="stok-opname.html" class="flex items-center gap-3 px-3 py-2.5 bg-amber-600/10 text-amber-500 rounded-lg font-medium text-sm transition-colors border border-amber-500/20">Stok Opname</a>
      <a href="lihat-stok.html" class="flex items-center gap-3 px-3 py-2.5 text-slate-400 hover:text-white hover:bg-slate-900 rounded-lg font-medium text-sm transition-colors">Lihat Stok</a>
    </nav>
  </aside>

  <main class="flex-1 flex flex-col min-w-0 bg-slate-900 overflow-y-auto">
    <header class="h-16 flex items-center justify-between px-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-sm sticky top-0 z-10">
      <h2 class="text-lg font-semibold text-amber-400">Form Stok Opname (Koreksi)</h2>
      <div class="text-sm font-medium text-slate-400">Petugas: <span id="namaPetugas" class="text-amber-400">Memuat...</span></div>
    </header>

    <div class="p-8 max-w-[1200px] mx-auto w-full">
      <div class="bg-slate-950 border border-slate-800 rounded-xl p-6 shadow-xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
          <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Tanggal Opname</label><input type="date" id="tanggalInput" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:border-amber-500 focus:outline-none"></div>
          <div><label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Kategori</label><select id="kategoriSelect" onchange="handleKategori()" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:border-amber-500 focus:outline-none"><option value="" disabled selected>-- Pilih Kategori --</option></select></div>
        </div>

        <div class="border border-slate-800 rounded-lg overflow-x-auto mb-6">
          <table class="w-full text-left border-collapse min-w-[900px]">
            <thead class="bg-slate-900 text-xs text-slate-400 border-b border-slate-800 uppercase tracking-wider">
              <tr><th class="p-4 w-3/12">Nama Barang</th><th class="p-4 w-1/12 text-center">Stok Sistem</th><th class="p-4 w-1/12 text-center">Stok Fisik</th><th class="p-4 w-1/12 text-center">Selisih</th><th class="p-4 w-1/12 text-center">Satuan</th><th class="p-4 w-4/12">Alasan Koreksi</th><th class="p-4 w-1/12 text-center">Aksi</th></tr>
            </thead>
            <tbody id="tbodyData"></tbody>
          </table>
          <button onclick="tambahBaris()" id="btnTambahBaris" class="text-amber-500 text-sm font-medium w-full text-center p-3 border-t border-slate-800 bg-slate-900 hover:bg-slate-800" disabled>+ Tambah Baris Opname</button>
        </div>
        <div class="flex justify-end"><button id="btnSimpan" class="bg-amber-600 hover:bg-amber-700 text-white px-8 py-3 rounded-lg text-sm font-semibold shadow-lg shadow-amber-600/20">Simpan Data Opname</button></div>
      </div>
    </div>
  </main>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3sNyaAR5b1MZjpjzuCuyeYuVi-bL0k1Nb1MgI40l5kQmSWfmxXCSfTpBy7sQ-0oQ/exec";
    let listBarang = [];
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('APJ_SESSION_ACTIVE') !== 'true') { window.location.href = 'index.html'; return; }
      document.getElementById('namaPetugas').textContent = localStorage.getItem('APJ_USER_NAME');
      document.getElementById('tanggalInput').value = new Date().toISOString().split('T')[0];
      const perms = JSON.parse(localStorage.getItem('APJ_USER_PERMISSIONS') || '{}');
      const kats = [{ key: 'bahanMentah', label: 'Bahan Mentah', sheet: 'MASTER_BAHAN_MENTAH' }, { key: 'bahanBaku', label: 'Bahan Baku', sheet: 'MASTER_BAHAN_BAKU' }, { key: 'kemasan', label: 'Kemasan', sheet: 'MASTER_KEMASAN' }, { key: 'minuman', label: 'Minuman', sheet: 'MASTER_MINUMAN' }, { key: 'kebersihan', label: 'Kebersihan', sheet: 'MASTER_KEBERSIHAN' }];
      kats.forEach(k => { if(perms[k.key] === 'Y') document.getElementById('kategoriSelect').innerHTML += `<option value="${k.sheet}">${k.label}</option>`; });
    });

    async function handleKategori() {
      const sh = document.getElementById('kategoriSelect').value; if(!sh) return;
      document.getElementById('tbodyData').innerHTML = '<tr><td colspan="7" class="p-4 text-center text-slate-400">Memuat data dari database...</td></tr>';
      try {
        const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'getBarang', sheetName: sh})})).json();
        listBarang = res.data; document.getElementById('tbodyData').innerHTML = ''; document.getElementById('btnTambahBaris').disabled = false; tambahBaris();
      } catch(e) { alert("Gagal mengambil data"); }
    }

    function tambahBaris() {
      const tr = document.createElement('tr'); tr.className = "border-b border-slate-800 item-row bg-slate-950";
      tr.innerHTML = `<td class="p-3"><select onchange="updSat(this)" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white select-barang"></select></td><td class="p-3"><input type="number" step="any" onkeyup="calc(this)" class="w-full bg-slate-900 border border-slate-700 text-center rounded-lg p-2.5 text-sm text-white input-sys" placeholder="0"></td><td class="p-3"><input type="number" step="any" onkeyup="calc(this)" class="w-full bg-slate-900 border border-slate-700 text-center rounded-lg p-2.5 text-sm text-white input-fis" placeholder="0"></td><td class="p-3 text-center text-sm font-bold label-selisih">0</td><td class="p-3 text-center label-sat text-sm font-bold text-amber-400">-</td><td class="p-3"><input type="text" placeholder="Misal: Barang Rusak/Hilang" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white input-alasan"></td><td class="p-3 text-center"><button onclick="this.closest('tr').remove()" class="text-slate-600 text-sm">Hapus</button></td>`;
      document.getElementById('tbodyData').appendChild(tr); if(listBarang.length) populate(tr.querySelector('.select-barang'));
    }

    function calc(el) {
      const tr = el.closest('tr');
      const s = parseFloat(tr.querySelector('.input-sys').value) || 0;
      const f = parseFloat(tr.querySelector('.input-fis').value) || 0;
      const d = f - s;
      const lbl = tr.querySelector('.label-selisih');
      lbl.innerText = d; lbl.className = `p-3 text-center text-sm font-bold label-selisih ${d < 0 ? 'text-rose-500' : (d > 0 ? 'text-emerald-500' : 'text-slate-400')}`;
    }

    function populate(sel) { sel.innerHTML = '<option value="" disabled selected>-- Pilih Barang --</option>'; listBarang.forEach(b => sel.innerHTML += `<option value="${b.id}" data-sat="${b.satuanStok}">[${b.id}] ${b.nama}</option>`); }
    function updSat(sel) { sel.closest('tr').querySelector('.label-sat').innerText = sel.options[sel.selectedIndex].getAttribute('data-sat') || '-'; }

    document.getElementById('btnSimpan').addEventListener('click', async () => {
      let data = [], err = false;
      document.querySelectorAll('.item-row').forEach(r => {
        let sel = r.querySelector('.select-barang'), sys = r.querySelector('.input-sys').value, fis = r.querySelector('.input-fis').value, dif = r.querySelector('.label-selisih').innerText, als = r.querySelector('.input-alasan').value;
        if(sel.value && sys !== '' && fis !== '') data.push([document.getElementById('tanggalInput').value, localStorage.getItem('APJ_USER_NAME'), document.getElementById('kategoriSelect').options[document.getElementById('kategoriSelect').selectedIndex].text, sel.value, sel.options[sel.selectedIndex].text.split('] ')[1], sys, fis, dif, r.querySelector('.label-sat').innerText, als]);
        else if(sel.value) err = true;
      });
      if(!data.length || err) return alert("Isi Stok Sistem & Fisik dengan benar!");
      document.getElementById('btnSimpan').innerText = "Menyimpan..."; document.getElementById('btnSimpan').disabled = true;
      const res = await (await fetch(APPS_SCRIPT_URL, { method: 'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify({action:'simpanTransaksi', sheetName:'STOK_OPNAME', data})})).json();
      if(res.success) { alert(res.message); location.reload(); } else { alert(res.message); document.getElementById('btnSimpan').disabled = false; }
    });
  </script>
</body>
</html>
